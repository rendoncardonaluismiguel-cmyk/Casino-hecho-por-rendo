<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mines — Casino Royale</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1923;--panel:#1a2535;--panel2:#222f42;--panel3:#1e2a3a;
  --tile:#2a3f5a;--tile-h:#304a6a;--tile-border:#3a5070;
  --gem:#00d4ff;--gem2:#40e8ff;--gem-bg:#0d3a4a;--gem-glow:rgba(0,212,255,.35);
  --bomb-bg:#3a1515;--bomb-border:#c0392b;
  --gold:#f0c040;--gold2:#fce07a;
  --green:#00e676;--green2:#69f0ae;--green-bg:rgba(0,230,118,.12);
  --red:#ff3d5a;--red2:#ff1744;
  --txt:rgba(210,230,255,.9);--txt2:rgba(210,230,255,.4);--txt3:rgba(210,230,255,.15);
  --border:rgba(0,212,255,.14);--border2:rgba(0,212,255,.06);
  --mult-bar:#1e3550;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);}
body{font-family:'Rajdhani',sans-serif;color:var(--txt);cursor:none;overflow-x:hidden;}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,100,160,.15) 0%,transparent 60%);
}

/* CURSOR */
#cur{width:16px;height:16px;border:1.5px solid var(--gem);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .07s;box-shadow:0 0 8px var(--gem-glow);}
#curDot{width:3px;height:3px;background:var(--gem2);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cur.h{transform:translate(-50%,-50%) scale(2);background:rgba(0,212,255,.07);}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:rgba(15,25,35,.98);border-bottom:1px solid var(--border);}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gem),transparent);opacity:.35;}
.back{font-family:'Bebas Neue';font-size:.75rem;letter-spacing:3px;color:var(--txt2);text-decoration:none;cursor:none;transition:color .2s;}
.back:hover{color:var(--gem);}
.top-title{font-family:'Orbitron';font-size:1rem;font-weight:900;color:var(--gem);text-shadow:0 0 18px rgba(0,212,255,.7);letter-spacing:4px;}
.top-coins{display:flex;align-items:center;gap:4px;background:rgba(0,212,255,.06);border:1px solid var(--border);padding:3px 10px;font-family:'DM Mono';font-size:.75rem;color:var(--gold2);}

/* PAGE */
.page{max-width:490px;margin:0 auto;padding:6px 6px 30px;display:flex;flex-direction:column;gap:7px;position:relative;z-index:1;}

/* MULT BAR */
.mult-bar{
  display:flex;align-items:center;gap:0;
  background:var(--mult-bar);border:1px solid var(--border);
  overflow:hidden;padding:0;
}
.mult-item{
  flex:1;padding:7px 4px;text-align:center;
  border-right:1px solid rgba(0,212,255,.08);
  transition:all .25s;position:relative;
}
.mult-item:last-child{border-right:none;}
.mult-item.active{background:rgba(0,212,255,.1);}
.mult-item.reached{background:rgba(0,230,118,.08);}
.mult-item.current{
  background:linear-gradient(180deg,rgba(0,230,118,.18),rgba(0,230,118,.06));
  border-color:rgba(0,230,118,.3);
}
.mult-item.current::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--green);box-shadow:0 0 6px rgba(0,230,118,.6);
}
.mi-label{font-family:'Bebas Neue';font-size:.42rem;letter-spacing:3px;color:var(--txt2);display:block;}
.mi-val{font-family:'Orbitron';font-size:.72rem;font-weight:700;color:var(--txt2);transition:color .25s;}
.mult-item.current .mi-val{color:var(--green);text-shadow:0 0 8px rgba(0,230,118,.5);}
.mult-item.reached .mi-val{color:var(--green2);}

/* GAME GRID */
.grid-section{
  background:var(--panel);border:1px solid var(--border);
  padding:12px;position:relative;
}
.grid-section::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,rgba(0,80,120,.08),transparent 70%);
}
.game-grid{
  display:grid;gap:6px;position:relative;z-index:1;
}
/* sizes set by JS: 5x5, 7x7, 9x9 */

/* TILE */
.tile{
  aspect-ratio:1;border-radius:6px;
  background:linear-gradient(145deg,var(--tile-h),var(--tile));
  border:1.5px solid var(--tile-border);
  display:flex;align-items:center;justify-content:center;
  cursor:none;position:relative;overflow:hidden;
  transition:all .15s;transform-style:preserve-3d;
}
.tile::before{
  content:'';position:absolute;top:0;left:0;right:0;height:45%;
  background:linear-gradient(180deg,rgba(255,255,255,.07),transparent);
  border-radius:5px 5px 0 0;pointer-events:none;
}
.tile:hover:not(.revealed){
  border-color:var(--gem);
  background:linear-gradient(145deg,#3a5878,#2e4a68);
  box-shadow:0 0 12px rgba(0,212,255,.2),inset 0 0 8px rgba(0,212,255,.04);
  transform:scale(1.04);
}
.tile:hover:not(.revealed)::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 30%,rgba(0,212,255,.08),transparent 65%);
}

/* TILE REVEALED STATES */
.tile.gem-tile{
  background:linear-gradient(145deg,#1a4a60,#0d3040);
  border-color:var(--gem);
  box-shadow:0 0 16px rgba(0,212,255,.25),inset 0 0 10px rgba(0,212,255,.07);
  animation:gemReveal .3s cubic-bezier(.18,1.5,.38,1) both;
  cursor:default;
}
.tile.bomb-tile{
  background:linear-gradient(145deg,#3a1010,#250808);
  border-color:var(--red);
  box-shadow:0 0 18px rgba(255,29,68,.35);
  animation:bombReveal .25s ease both;
  cursor:default;
}
.tile.bomb-miss{
  background:linear-gradient(145deg,#2a1010,#1a0808);
  border-color:rgba(192,57,43,.4);
  opacity:.6;
}
.tile.safe-reveal{
  background:linear-gradient(145deg,#1a3a50,#0d2530);
  border-color:rgba(0,180,210,.3);
  opacity:.7;
  cursor:default;
}
@keyframes gemReveal{
  0%{transform:scale(.5) rotateY(90deg);opacity:0;}
  60%{transform:scale(1.1) rotateY(-5deg);}
  100%{transform:scale(1) rotateY(0);opacity:1;}
}
@keyframes bombReveal{
  0%{transform:scale(.6);opacity:0;}
  40%{transform:scale(1.15);}
  70%{transform:scale(.95);}
  100%{transform:scale(1);opacity:1;}
}

/* GEM ICON */
.gem-icon{
  width:55%;height:55%;position:relative;
  animation:gemFloat 2.5s ease-in-out infinite;
}
@keyframes gemFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

.gem-icon svg{width:100%;height:100%;filter:drop-shadow(0 0 6px var(--gem)) drop-shadow(0 0 14px rgba(0,212,255,.4));}

/* BOMB ICON */
.bomb-wrap{
  width:58%;height:58%;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.bomb-wrap::before{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,50,50,.3),transparent 70%);
  animation:bombGlow .6s ease-in-out infinite alternate;
}
@keyframes bombGlow{from{opacity:.5}to{opacity:1}}
.bomb-wrap svg{width:100%;height:100%;filter:drop-shadow(0 0 6px rgba(255,50,50,.8));}

/* SHINE on gem tile */
.tile.gem-tile::after{
  content:'';position:absolute;top:8%;left:20%;width:25%;height:25%;
  background:rgba(255,255,255,.22);border-radius:50%;
  filter:blur(2px);pointer-events:none;
}

/* EXPLOSION RING */
.expl-ring{
  position:absolute;inset:0;border-radius:6px;
  background:radial-gradient(circle,rgba(255,100,50,.5) 0%,rgba(255,30,30,.2) 50%,transparent 70%);
  animation:explode .5s ease forwards;pointer-events:none;z-index:10;
}
@keyframes explode{0%{opacity:0;transform:scale(.3)}40%{opacity:1}100%{opacity:0;transform:scale(1.5)}}

/* STATUS BAR */
.status-bar{
  display:flex;align-items:center;justify-content:center;
  padding:9px 12px;min-height:48px;
  background:var(--panel);border:1px solid var(--border);
  text-align:center;gap:8px;
}
.sb-idle{font-family:'Rajdhani';font-size:.8rem;letter-spacing:2px;color:var(--txt2);font-weight:600;}
.sb-playing{font-family:'Orbitron';font-size:.72rem;font-weight:700;color:var(--green);text-shadow:0 0 10px rgba(0,230,118,.5);}
.sb-win{font-family:'Orbitron';font-size:.88rem;font-weight:900;color:var(--gold2);text-shadow:0 0 16px rgba(240,192,64,.5);animation:winPop .35s cubic-bezier(.18,1.5,.38,1) both;}
.sb-lose{font-family:'Orbitron';font-size:.78rem;font-weight:700;color:var(--red);text-shadow:0 0 10px rgba(255,29,68,.4);}
@keyframes winPop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.sb-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* CONTROLS */
.controls{background:var(--panel);border:1px solid var(--border);padding:10px;}
.ctrl-row{display:flex;gap:6px;margin-bottom:8px;align-items:flex-start;}
.ctrl-block{display:flex;flex-direction:column;gap:4px;flex:1;}
.ctrl-lbl{font-family:'Bebas Neue';font-size:.48rem;letter-spacing:5px;color:var(--txt2);display:block;}

/* MINES SELECTOR */
.mines-row{display:flex;gap:3px;}
.mine-btn{
  flex:1;padding:6px 2px;text-align:center;
  font-family:'Orbitron';font-size:.58rem;font-weight:700;
  background:var(--panel3);border:1px solid var(--border2);
  color:var(--txt2);cursor:none;transition:.15s;
}
.mine-btn:hover{border-color:var(--gem2);color:var(--gem2);}
.mine-btn.sel{background:rgba(0,212,255,.1);border-color:var(--gem);color:var(--gem);box-shadow:0 0 8px rgba(0,212,255,.15);}

/* GRID SIZE SELECTOR */
.size-row{display:flex;gap:3px;}
.size-btn{
  flex:1;padding:6px 2px;text-align:center;
  font-family:'Orbitron';font-size:.52rem;font-weight:700;
  background:var(--panel3);border:1px solid var(--border2);
  color:var(--txt2);cursor:none;transition:.15s;
}
.size-btn:hover{border-color:var(--gem2);color:var(--gem2);}
.size-btn.sel{background:rgba(0,212,255,.1);border-color:var(--gem);color:var(--gem);}

/* CHIP SELECTOR */
.chip-row{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;}
.chip{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron';font-size:.5rem;font-weight:700;
  cursor:none;transition:.15s;position:relative;flex-shrink:0;
  box-shadow:0 3px 8px rgba(0,0,0,.7);
}
.chip::before{content:'';position:absolute;inset:3px;border-radius:50%;border:1.5px dashed rgba(255,255,255,.2);}
.chip:hover,.chip.sel{transform:translateY(-3px) scale(1.1);}
.chip.sel{outline:2px solid var(--gem);outline-offset:2px;box-shadow:0 0 10px rgba(0,212,255,.3);}
.ch1{background:radial-gradient(circle at 35% 35%,#666,#222);}
.ch5{background:radial-gradient(circle at 35% 35%,#e55,#700);}
.ch10{background:radial-gradient(circle at 35% 35%,#55e,#007);}
.ch25{background:radial-gradient(circle at 35% 35%,#5c5,#070);}
.ch100{background:radial-gradient(circle at 35% 35%,#eb6,#840);}
.ch500{background:radial-gradient(circle at 35% 35%,#b5e,#609);}

/* ACTION ROW */
.action-row{display:flex;gap:6px;}
.bet-info{flex:1;background:var(--panel3);border:1px solid var(--border2);padding:7px 10px;}
.bi-lbl{font-family:'Bebas Neue';font-size:.44rem;letter-spacing:4px;color:var(--txt2);display:block;}
.bi-val{font-family:'DM Mono';font-size:.85rem;color:var(--gold2);}

/* PLAY / CASHOUT BUTTON */
.main-btn{
  flex:2.2;height:56px;cursor:none;position:relative;overflow:hidden;
  transition:all .12s;
}
.main-btn:active,.main-btn.pressed{transform:scale(.97);}
.main-btn:disabled{opacity:.35;pointer-events:none;}

.btn-play-skin{
  width:100%;height:100%;
  background:linear-gradient(180deg,#003a20,#001e10);
  border:1px solid var(--green);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;
  position:relative;overflow:hidden;
}
.btn-play-skin::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,230,118,.12),transparent);pointer-events:none;}

.btn-cash-skin{
  width:100%;height:100%;
  background:linear-gradient(180deg,#2a2000,#161000);
  border:1px solid var(--gold);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;
  position:relative;overflow:hidden;
}
.btn-cash-skin::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(240,192,64,.12),transparent);pointer-events:none;}

.btn-icon{font-size:1rem;}
.btn-lbl{font-family:'Orbitron';font-size:.6rem;font-weight:700;letter-spacing:3px;}
.btn-play-skin .btn-lbl{color:var(--green);text-shadow:0 0 8px rgba(0,230,118,.5);}
.btn-cash-skin .btn-lbl{color:var(--gold2);text-shadow:0 0 8px rgba(240,192,64,.4);}
.btn-sub{font-family:'DM Mono';font-size:.55rem;color:rgba(255,255,255,.35);}

/* LIVE STATS ROW */
.live-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.lbox{background:var(--panel);border:1px solid var(--border2);padding:6px 4px;text-align:center;}
.lv{font-family:'DM Mono';font-size:.8rem;display:block;color:var(--gold);}
.ll{font-family:'Bebas Neue';font-size:.42rem;letter-spacing:3px;color:var(--txt2);display:block;margin-top:1px;}
.lv.pos{color:var(--green2);}.lv.neg{color:var(--red);}

/* HISTORY */
.hist-wrap{background:var(--panel);border:1px solid var(--border2);padding:7px 9px;}
.hl{font-family:'Bebas Neue';font-size:.44rem;letter-spacing:4px;color:var(--txt2);display:block;margin-bottom:6px;}
.hdots{display:flex;gap:3px;flex-wrap:wrap;}
.hd{padding:2px 7px;font-family:'DM Mono';font-size:.58rem;animation:hdIn .2s ease both;border:1px solid;}
@keyframes hdIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.hw{background:rgba(0,230,118,.07);border-color:rgba(0,230,118,.28);color:var(--green2);}
.hl2{background:rgba(255,29,68,.06);border-color:rgba(255,29,68,.2);color:var(--red);}

.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:rgba(10,18,28,.97);border:1px solid var(--gem);color:var(--gem);font-family:'Bebas Neue';font-size:.72rem;letter-spacing:3px;padding:5px 14px;z-index:700;white-space:nowrap;pointer-events:none;animation:tIn .2s ease both;}
@keyframes tIn{from{opacity:0;transform:translateX(-50%)translateY(-5px)}to{opacity:1;transform:translateX(-50%)translateY(0)}}
.toast.err{border-color:var(--red);color:var(--red);}
.cf{position:fixed;pointer-events:none;z-index:600;border-radius:2px;animation:cfA var(--dur,2s) ease forwards;}
@keyframes cfA{0%{opacity:1;transform:translateY(0)rotate(0)}100%{opacity:0;transform:translateY(110vh)rotate(720deg)}}
</style>
</head>
<body>
<div id="cur"></div><div id="curDot"></div>

<div class="topbar">
  <a href="index.html" class="back">← CASINO</a>
  <span class="top-title">MINES</span>
  <div class="top-coins">🪙 <span id="coinsEl">—</span></div>
</div>

<div class="page">

  <!-- MULTIPLIER BAR -->
  <div class="mult-bar" id="multBar"></div>

  <!-- GRID -->
  <div class="grid-section">
    <div class="game-grid" id="gameGrid"></div>
  </div>

  <!-- STATUS -->
  <div class="status-bar" id="statusBar">
    <span class="sb-idle">◆ CONFIGURA TU APUESTA Y PULSA JUGAR ◆</span>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="ctrl-row">
      <!-- MINES -->
      <div class="ctrl-block">
        <span class="ctrl-lbl">NÚMERO DE MINAS</span>
        <div class="mines-row">
          <button class="mine-btn" data-m="1"  onclick="setMines(1,this)">1</button>
          <button class="mine-btn sel" data-m="3" onclick="setMines(3,this)">3</button>
          <button class="mine-btn" data-m="5"  onclick="setMines(5,this)">5</button>
          <button class="mine-btn" data-m="10" onclick="setMines(10,this)">10</button>
          <button class="mine-btn" data-m="24" onclick="setMines(24,this)">MAX</button>
        </div>
      </div>
      <!-- GRID SIZE -->
      <div class="ctrl-block">
        <span class="ctrl-lbl">TAMAÑO DEL TABLERO</span>
        <div class="size-row">
          <button class="size-btn sel" data-s="5" onclick="setGridSize(5,this)">5×5</button>
          <button class="size-btn" data-s="7" onclick="setGridSize(7,this)">7×7</button>
          <button class="size-btn" data-s="9" onclick="setGridSize(9,this)">9×9</button>
        </div>
      </div>
    </div>

    <span class="ctrl-lbl" style="margin-bottom:6px;display:block;">APUESTA</span>
    <div class="chip-row">
      <div class="chip ch1"   onclick="selChip(1,this)">1</div>
      <div class="chip ch5"   onclick="selChip(5,this)">5</div>
      <div class="chip ch10 sel" onclick="selChip(10,this)">10</div>
      <div class="chip ch25"  onclick="selChip(25,this)">25</div>
      <div class="chip ch100" onclick="selChip(100,this)">100</div>
      <div class="chip ch500" onclick="selChip(500,this)">500</div>
    </div>

    <div class="action-row">
      <div class="bet-info">
        <span class="bi-lbl">APUESTA</span>
        <span class="bi-val" id="betEl">10</span>
      </div>
      <div class="bet-info">
        <span class="bi-lbl">CRÉDITOS</span>
        <span class="bi-val" id="balEl">—</span>
      </div>
      <button class="main-btn" id="mainBtn" onclick="mainAction()">
        <div class="btn-play-skin" id="btnSkin">
          <span class="btn-icon" id="btnIcon">💣</span>
          <span class="btn-lbl"  id="btnLbl">JUGAR</span>
        </div>
      </button>
    </div>
  </div>

  <!-- LIVE STATS -->
  <div class="live-row">
    <div class="lbox"><span class="lv" id="stR">0</span><span class="ll">PARTIDAS</span></div>
    <div class="lbox"><span class="lv pos" id="stW">0</span><span class="ll">GANAD.</span></div>
    <div class="lbox"><span class="lv neg" id="stL">0</span><span class="ll">PERDID.</span></div>
    <div class="lbox"><span class="lv" id="stNet">0</span><span class="ll">NETO</span></div>
  </div>

  <!-- HISTORY -->
  <div class="hist-wrap">
    <span class="hl">◆ HISTORIAL</span>
    <div class="hdots" id="histEl"></div>
  </div>

</div>

<script>
/* ── COINS ─────────────────────────────────────────────── */
const CKEY='casino_royale_coins';
const Coins={
  get(){const v=parseInt(localStorage.getItem(CKEY));return isNaN(v)?10000:v;},
  set(n){const v=Math.max(0,Math.round(n));localStorage.setItem(CKEY,v);return v;},
  add(n){return this.set(this.get()+n);},
  sub(n){return this.set(this.get()-n);},
  fmt(n){return(n??this.get()).toLocaleString('de-DE');}
};

/* ── SVGs ───────────────────────────────────────────────── */
const GEM_SVG=`<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gTop" x1="24" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a0f0ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="gBot" x1="24" y1="24" x2="24" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0090c0"/>
      <stop offset="100%" stop-color="#004a70"/>
    </linearGradient>
    <linearGradient id="gLeft" x1="0" y1="24" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0080b0"/>
      <stop offset="100%" stop-color="#00c0e8"/>
    </linearGradient>
    <linearGradient id="gRight" x1="24" y1="24" x2="48" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00c0e8"/>
      <stop offset="100%" stop-color="#0080b0"/>
    </linearGradient>
  </defs>
  <!-- top facets -->
  <polygon points="24,2 8,18 24,14" fill="url(#gTop)" opacity=".9"/>
  <polygon points="24,2 40,18 24,14" fill="url(#gTop)" opacity=".7"/>
  <!-- upper mid -->
  <polygon points="8,18 24,14 24,26 4,28" fill="url(#gLeft)" opacity=".85"/>
  <polygon points="40,18 24,14 24,26 44,28" fill="url(#gRight)" opacity=".85"/>
  <!-- center -->
  <polygon points="4,28 24,26 24,46" fill="url(#gBot)" opacity=".8"/>
  <polygon points="44,28 24,26 24,46" fill="url(#gBot)" opacity=".6"/>
  <!-- horizontal band -->
  <polygon points="4,28 44,28 24,26" fill="#40e8ff" opacity=".25"/>
  <!-- top highlight -->
  <polygon points="24,4 16,16 24,12" fill="white" opacity=".35"/>
</svg>`;

const BOMB_SVG=`<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- fuse spark -->
  <circle cx="32" cy="8" r="3" fill="#ff9800" opacity=".9"/>
  <circle cx="32" cy="8" r="5" fill="#ff9800" opacity=".3"/>
  <!-- fuse line -->
  <path d="M28 14 Q32 10 32 6" stroke="#888" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- body shadow -->
  <circle cx="23" cy="28" r="14" fill="rgba(0,0,0,.4)"/>
  <!-- body -->
  <circle cx="22" cy="26" r="14" fill="#1a1a1a"/>
  <circle cx="22" cy="26" r="13" fill="url(#bombGrad)"/>
  <defs>
    <radialGradient id="bombGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="60%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>
  <!-- highlight -->
  <circle cx="16" cy="19" r="4" fill="white" opacity=".12"/>
  <!-- studs -->
  <circle cx="22" cy="26" r="2" fill="#333"/>
  <!-- connecting pin -->
  <rect x="26" y="13" width="4" height="5" rx="1" fill="#555"/>
</svg>`;

/* ── STATE ─────────────────────────────────────────────── */
let gridSize=5, minesCount=3, chipVal=10;
let coins=Coins.get();
let gameState='idle'; // idle|playing|done
let minePositions=new Set();
let revealedSafe=0, totalSafe=0;
let currentMult=1;
let stats={r:0,w:0,l:0,net:0};
let history=[];

/* ── MULTIPLIER MATH ─────────────────────────────────────
   P(safe) after k reveals = C(safe-k, 1) / C(total-k, 1)
   Running mult = bet * product(total/(total-mines-i)) for i=0..k-1
   We use a house edge of 0.97 (3% edge)
*/
function calcMult(safePicked, totalCells, mines){
  const safe=totalCells-mines;
  if(safePicked===0) return 1;
  let m=1;
  for(let i=0;i<safePicked;i++){
    m *= (totalCells-i)/(totalCells-mines-i);
  }
  return Math.max(1, m*0.97); // 3% house edge
}

/* ── MULT BAR ────────────────────────────────────────────── */
function buildMultBar(){
  const bar=document.getElementById('multBar');
  bar.innerHTML='';
  // Show next 5 multipliers from current state
  const total=gridSize*gridSize;
  const safe=total-minesCount;
  const steps=Math.min(5,safe);
  for(let i=1;i<=steps;i++){
    const m=calcMult(i,total,minesCount);
    const div=document.createElement('div');
    div.className='mult-item';div.id='mi-'+i;
    div.innerHTML=`<span class="mi-label">${i} GEM${i>1?'S':''}</span><span class="mi-val">${m.toFixed(2)}×</span>`;
    bar.appendChild(div);
  }
}

function updateMultBar(){
  const total=gridSize*gridSize;
  const steps=Math.min(5,total-minesCount);
  for(let i=1;i<=steps;i++){
    const el=document.getElementById('mi-'+i);
    if(!el) continue;
    el.className='mult-item'+(i<revealedSafe?'reached':i===revealedSafe?' current':'');
  }
}

/* ── GRID ────────────────────────────────────────────────── */
function buildGrid(){
  const g=document.getElementById('gameGrid');
  g.innerHTML='';
  const total=gridSize*gridSize;
  g.style.gridTemplateColumns=`repeat(${gridSize},1fr)`;
  g.style.gap=gridSize>=9?'4px':'6px';
  for(let i=0;i<total;i++){
    const t=document.createElement('div');
    t.className='tile';t.dataset.idx=i;
    t.addEventListener('click',()=>clickTile(i));
    g.appendChild(t);
  }
}

function getTile(i){return document.querySelector(`.tile[data-idx="${i}"]`);}

/* ── PLACE MINES ─────────────────────────────────────────── */
function placeMines(){
  minePositions.clear();
  const total=gridSize*gridSize;
  while(minePositions.size<minesCount){
    minePositions.add(Math.floor(Math.random()*total));
  }
}

/* ── CLICK TILE ──────────────────────────────────────────── */
function clickTile(idx){
  if(gameState!=='playing') return;
  const tile=getTile(idx);
  if(!tile||tile.classList.contains('revealed')) return;
  tile.classList.add('revealed');

  if(minePositions.has(idx)){
    // BOMB
    tile.classList.add('bomb-tile');
    tile.innerHTML=`<div class="bomb-wrap">${BOMB_SVG}</div><div class="expl-ring"></div>`;
    bombShake();
    setTimeout(()=>revealAll(idx),300);
    endGame(false);
  } else {
    // GEM
    revealedSafe++;
    currentMult=calcMult(revealedSafe,gridSize*gridSize,minesCount);
    tile.classList.add('gem-tile');
    tile.innerHTML=`<div class="gem-icon">${GEM_SVG}</div>`;
    updateMultBar();
    updateStatusPlaying();
    updateCashoutBtn();

    // Auto cashout if all safe tiles revealed
    if(revealedSafe>=totalSafe){
      setTimeout(()=>cashout(),400);
    }
  }
}

function revealAll(clickedBomb){
  const total=gridSize*gridSize;
  for(let i=0;i<total;i++){
    if(i===clickedBomb) continue;
    const t=getTile(i);
    if(!t||t.classList.contains('revealed')) continue;
    t.classList.add('revealed');
    if(minePositions.has(i)){
      t.classList.add('bomb-miss');
      t.innerHTML=`<div class="bomb-wrap" style="opacity:.5">${BOMB_SVG}</div>`;
    } else {
      t.classList.add('safe-reveal');
      t.innerHTML=`<div class="gem-icon" style="opacity:.35">${GEM_SVG}</div>`;
    }
  }
}

/* ── BOMB SHAKE ──────────────────────────────────────────── */
function bombShake(){
  const g=document.getElementById('gameGrid');
  g.style.animation='none';g.offsetHeight;
  g.style.animation='shake .4s ease';
  setTimeout(()=>g.style.animation='',400);
}

/* ── STATUS UPDATES ──────────────────────────────────────── */
function updateStatusPlaying(){
  document.getElementById('statusBar').innerHTML=`
    <div class="sb-dot"></div>
    <span class="sb-playing">×${currentMult.toFixed(2)} · ${revealedSafe} GEM${revealedSafe!==1?'S':''} SEGUROS</span>`;
}

/* ── CASHOUT BTN ─────────────────────────────────────────── */
function updateCashoutBtn(){
  const won=Math.floor(chipVal*currentMult);
  document.getElementById('btnSkin').className='btn-cash-skin';
  document.getElementById('btnSkin').innerHTML=`
    <span class="btn-icon">💰</span>
    <span class="btn-lbl" style="color:var(--gold2);text-shadow:0 0 8px rgba(240,192,64,.5)">COBRAR</span>
    <span class="btn-sub">+${Coins.fmt(won)} fichas</span>`;
}

function resetPlayBtn(){
  document.getElementById('btnSkin').className='btn-play-skin';
  document.getElementById('btnSkin').innerHTML=`
    <span class="btn-icon" id="btnIcon">💣</span>
    <span class="btn-lbl" id="btnLbl">JUGAR</span>`;
}

/* ── MAIN ACTION ─────────────────────────────────────────── */
function mainAction(){
  if(gameState==='idle'||gameState==='done') startGame();
  else if(gameState==='playing') cashout();
}

function startGame(){
  if(coins<chipVal){toast('Fichas insuficientes','err');return;}
  const total=gridSize*gridSize;
  if(minesCount>=total){toast('Demasiadas minas','err');return;}

  coins=Coins.sub(chipVal);animCoins(coins+chipVal,coins);
  placeMines();
  revealedSafe=0;
  totalSafe=total-minesCount;
  currentMult=1;
  gameState='playing';

  buildGrid();
  buildMultBar();
  document.getElementById('statusBar').innerHTML=`
    <div class="sb-dot"></div>
    <span class="sb-playing">◆ HAZ CLIC EN LAS TILES · EVITA LAS MINAS ◆</span>`;

  // Swap button to show cashout is available after first pick
  resetPlayBtn();
  document.getElementById('btnSkin').className='btn-cash-skin';
  document.getElementById('btnSkin').innerHTML=`
    <span class="btn-icon">💰</span>
    <span class="btn-lbl" style="color:var(--gold2);text-shadow:0 0 8px rgba(240,192,64,.5)">COBRAR</span>
    <span class="btn-sub">×1.00</span>`;

  lockControls(true);
}

function cashout(){
  if(gameState!=='playing') return;
  if(revealedSafe===0){
    // No gems found yet — just cancel
    endGame(false,true);return;
  }
  const won=Math.floor(chipVal*currentMult);
  coins=Coins.add(won);animCoins(coins-won,coins);
  stats.r++;stats.w++;stats.net+=(won-chipVal);
  history.unshift({won:true,mult:currentMult,net:won-chipVal});
  document.getElementById('statusBar').innerHTML=`<span class="sb-win">+${Coins.fmt(won)} FICHAS · ×${currentMult.toFixed(2)}</span>`;
  if(won>=chipVal*5) confetti(won>=chipVal*20?80:40);
  updateStats();renderHistory();
  revealAll(-1);
  gameState='done';
  lockControls(false);
  resetPlayBtn();
  document.getElementById('btnLbl').textContent='NUEVA';
}

function endGame(hitBomb,cancel=false){
  gameState='done';
  if(hitBomb){
    stats.r++;stats.l++;stats.net-=chipVal;
    history.unshift({won:false,mult:0,net:-chipVal});
    document.getElementById('statusBar').innerHTML=`<span class="sb-lose">💥 MINA · PERDISTE ${Coins.fmt(chipVal)} FICHAS</span>`;
    updateStats();renderHistory();
  } else if(cancel){
    // returned bet
    coins=Coins.add(chipVal);animCoins(coins-chipVal,coins);
    document.getElementById('statusBar').innerHTML=`<span class="sb-idle">◆ APUESTA DEVUELTA ◆</span>`;
  }
  lockControls(false);
  resetPlayBtn();
  document.getElementById('btnLbl').textContent='NUEVA';
}

/* ── LOCK CONTROLS ───────────────────────────────────────── */
function lockControls(lock){
  document.querySelectorAll('.mine-btn,.size-btn,.chip').forEach(b=>b.style.pointerEvents=lock?'none':'auto');
  document.querySelectorAll('.mine-btn,.size-btn,.chip').forEach(b=>b.style.opacity=lock?'.4':'1');
}

/* ── SETTERS ─────────────────────────────────────────────── */
function setMines(n,el){
  if(gameState==='playing') return;
  minesCount=n;
  document.querySelectorAll('.mine-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  buildMultBar();
}
function setGridSize(s,el){
  if(gameState==='playing') return;
  gridSize=s;
  // Cap mines to grid-1
  minesCount=Math.min(minesCount,gridSize*gridSize-1);
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  buildGrid();buildMultBar();gameState='idle';
  resetPlayBtn();document.getElementById('btnLbl').textContent='JUGAR';
  document.getElementById('statusBar').innerHTML=`<span class="sb-idle">◆ CONFIGURA TU APUESTA Y PULSA JUGAR ◆</span>`;
}
function selChip(v,el){
  if(gameState==='playing') return;
  chipVal=v;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('betEl').textContent=Coins.fmt(chipVal);
}

/* ── STATS & HISTORY ─────────────────────────────────────── */
function updateStats(){
  document.getElementById('stR').textContent=stats.r;
  document.getElementById('stW').textContent=stats.w;
  document.getElementById('stL').textContent=stats.l;
  const n=document.getElementById('stNet');
  n.textContent=(stats.net>=0?'+':'')+Coins.fmt(stats.net);
  n.className='lv '+(stats.net>0?'pos':stats.net<0?'neg':'');
}
function renderHistory(){
  if(history.length>22) history.length=22;
  document.getElementById('histEl').innerHTML=history.map(h=>{
    const cls=h.won?'hw':'hl2';
    const lbl=h.won?`×${h.mult.toFixed(2)}`:'💥';
    return`<div class="hd ${cls}">${lbl}</div>`;
  }).join('');
}

/* ── COINS ANIMATION ─────────────────────────────────────── */
function animCoins(from,to){
  const dur=500,t0=performance.now();
  function step(now){
    const t=Math.min((now-t0)/dur,1),e=1-Math.pow(1-t,3);
    const v=Math.round(from+(to-from)*e);
    document.getElementById('coinsEl').textContent=Coins.fmt(v);
    document.getElementById('balEl').textContent=Coins.fmt(v);
    if(t<1) requestAnimationFrame(step);
    else{document.getElementById('coinsEl').textContent=Coins.fmt(to);document.getElementById('balEl').textContent=Coins.fmt(to);}
  }
  requestAnimationFrame(step);
}

/* ── EFFECTS ─────────────────────────────────────────────── */
function confetti(n=40){
  const cols=['#00e5ff','#00e676','#f0c040','#fff','#ff3d5a','#bb86fc'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');c.className='cf';
    c.style.cssText=`left:${5+Math.random()*90}vw;top:-10px;width:${4+Math.random()*7}px;height:${4+Math.random()*7}px;background:${cols[i%cols.length]};--dur:${1.4+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),3000);
  }
}
function toast(msg,type=''){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='toast '+(type||'');el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2400);
}

/* ── CURSOR ──────────────────────────────────────────────── */
const curEl=document.getElementById('cur'),curDot=document.getElementById('curDot');
let mx=0,my=0,ccx=0,ccy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curDot.style.left=mx+'px';curDot.style.top=my+'px';});
(function loop(){ccx+=(mx-ccx)*.14;ccy+=(my-ccy)*.14;curEl.style.left=ccx+'px';curEl.style.top=ccy+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('button,a,.chip,.tile').forEach(el=>{el.addEventListener('mouseenter',()=>curEl.classList.add('h'));el.addEventListener('mouseleave',()=>curEl.classList.remove('h'));});

/* ── GRID SHAKE KEYFRAME ──────────────────────────────────── */
const style=document.createElement('style');
style.textContent=`@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-7px)}30%{transform:translateX(6px)}45%{transform:translateX(-5px)}60%{transform:translateX(4px)}75%{transform:translateX(-2px)}}`;
document.head.appendChild(style);

/* ── INIT ────────────────────────────────────────────────── */
coins=Coins.get();
document.getElementById('coinsEl').textContent=Coins.fmt(coins);
document.getElementById('balEl').textContent=Coins.fmt(coins);
document.getElementById('betEl').textContent=Coins.fmt(chipVal);
buildGrid();
buildMultBar();
</script>
</body>
