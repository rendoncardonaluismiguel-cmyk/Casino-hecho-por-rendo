<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Juego de la Rana — Casino Royale</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Crimson+Pro:ital,wght@0,600;1,400&family=Bebas+Neue&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#170d06;--bg2:#1f1108;
  --wood:#2a1608;--wood2:#3c2010;--wood3:#4e2c18;
  --felt:#0b3016;--felt2:#0e3d1c;
  --gold:#d4a017;--gold2:#f0c040;--gold3:#b88010;
  --cream:#fef8e8;--ivory:#f5edcc;
  --red-h:#b91c1c;--green-h:#166534;
  --orange-h:#c2410c;--blue-h:#1d4ed8;
  --txt:rgba(254,248,232,.92);--txt2:rgba(254,248,232,.45);
  --border:rgba(212,160,23,.25);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);}
body{font-family:'Crimson Pro',serif;color:var(--cream);cursor:none;overflow-x:hidden;}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 20%,rgba(255,200,80,.04),transparent 65%);}

/* CURSOR */
#cur{width:20px;height:20px;border:1.5px solid var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .07s;box-shadow:0 0 8px rgba(212,160,23,.5);}
#curDot{width:4px;height:4px;background:var(--gold2);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cur.h{transform:translate(-50%,-50%) scale(2);background:rgba(212,160,23,.08);}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(23,13,6,.98);border-bottom:2px solid rgba(212,160,23,.2);}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}
.back{font-family:'Bebas Neue';font-size:.8rem;letter-spacing:2px;color:var(--txt2);text-decoration:none;cursor:none;transition:color .2s;}
.back:hover{color:var(--gold2);}
.top-title{font-family:'Abril Fatface',cursive;font-size:1rem;color:var(--gold2);text-shadow:0 0 16px rgba(240,192,64,.3);letter-spacing:1px;}
.top-coins{display:flex;align-items:center;gap:5px;background:rgba(212,160,23,.07);border:1px solid var(--border);padding:4px 12px;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--gold2);white-space:nowrap;}

/* PAGE */
.page{max-width:490px;margin:0 auto;padding:8px 8px 28px;display:flex;flex-direction:column;gap:8px;position:relative;z-index:1;}

/* SCORE BANNER */
.score-banner{
  background:linear-gradient(180deg,var(--wood2),var(--wood));
  border:2px solid var(--gold3);
  padding:8px 14px;display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;
}
.score-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.sb-lbl{font-family:'Bebas Neue';font-size:.55rem;letter-spacing:4px;color:var(--txt2);}
.sb-val{font-family:'Abril Fatface',cursive;font-size:1.4rem;color:var(--gold2);text-shadow:0 0 12px rgba(240,192,64,.35);line-height:1;}
.sb-sep{width:1px;height:36px;background:rgba(212,160,23,.2);}
.throws-left{display:flex;gap:6px;align-items:center;}
.throw-dot{width:12px;height:12px;border-radius:50%;background:var(--gold2);box-shadow:0 0 8px rgba(240,192,64,.5);transition:all .3s;}
.throw-dot.used{background:rgba(255,255,255,.1);box-shadow:none;}

/* GAME CANVAS */
.game-wrap{
  border:3px solid var(--wood3);
  box-shadow:0 0 30px rgba(0,0,0,.6),0 0 60px rgba(212,160,23,.04),inset 0 0 30px rgba(0,0,0,.5);
  position:relative;overflow:hidden;touch-action:none;cursor:none;
  background:var(--felt);
}
#gameCv{display:block;width:100%;touch-action:none;}

/* INSTRUCTION */
.instruct{
  font-family:'Crimson Pro',serif;font-style:italic;font-size:.82rem;
  text-align:center;color:var(--txt2);padding:5px;
  background:rgba(0,0,0,.4);border:1px solid rgba(212,160,23,.1);
  letter-spacing:1px;
}
.instruct b{color:var(--gold2);}

/* CONTROLS */
.controls{
  background:var(--wood);border:1px solid var(--border);
  padding:10px 10px 12px;
}
.ctrl-title{font-family:'Bebas Neue';font-size:.58rem;letter-spacing:5px;color:var(--txt2);display:block;margin-bottom:8px;}

/* CHIPS */
.chip-row{display:flex;gap:7px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
.chip{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:.7rem;cursor:none;transition:.18s;position:relative;flex-shrink:0;box-shadow:0 3px 8px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.15);}
.chip::before{content:'';position:absolute;inset:3px;border-radius:50%;border:2px dashed rgba(255,255,255,.25);}
.chip:hover,.chip.sel{transform:translateY(-4px) scale(1.12);}
.chip.sel{outline:2px solid var(--gold2);outline-offset:2px;box-shadow:0 3px 8px rgba(0,0,0,.7),0 0 14px rgba(212,160,23,.4);}
.ch1  {background:radial-gradient(circle at 35% 35%,#888,#333);}
.ch5  {background:radial-gradient(circle at 35% 35%,#e55,#900);}
.ch10 {background:radial-gradient(circle at 35% 35%,#55e,#009);}
.ch25 {background:radial-gradient(circle at 35% 35%,#5c5,#090);}
.ch100{background:radial-gradient(circle at 35% 35%,#eb6,#840);}
.ch500{background:radial-gradient(circle at 35% 35%,#b5e,#609);}

/* BET + BUTTON */
.bet-row{display:flex;gap:8px;align-items:stretch;}
.bet-info{flex:1;background:rgba(0,0,0,.5);border:1px solid rgba(212,160,23,.12);padding:8px 12px;display:flex;flex-direction:column;justify-content:center;}
.bi-lbl{font-family:'Bebas Neue';font-size:.5rem;letter-spacing:4px;color:var(--txt2);}
.bi-val{font-family:'DM Mono',monospace;font-size:.9rem;color:var(--gold2);}

.start-btn{
  flex:2;padding:10px;
  font-family:'Abril Fatface',cursive;font-size:1rem;letter-spacing:3px;
  background:linear-gradient(135deg,var(--red-h),#7f1d1d);
  color:var(--gold2);border:1px solid rgba(212,160,23,.25);
  cursor:none;transition:.2s;position:relative;overflow:hidden;
  text-shadow:0 0 12px rgba(240,192,64,.4);
}
.start-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transform:translateX(-100%);transition:.5s;}
.start-btn:not(:disabled):hover::before{transform:translateX(100%);}
.start-btn:not(:disabled):hover{box-shadow:0 0 24px rgba(185,28,28,.45);}
.start-btn:disabled{opacity:.3;cursor:not-allowed;}

/* PAYTABLE */
.paytable{background:rgba(0,0,0,.5);border:1px solid var(--border);padding:10px 12px;}
.pt-title{font-family:'Bebas Neue';font-size:.58rem;letter-spacing:5px;color:var(--txt2);display:block;margin-bottom:8px;text-align:center;}
.pt-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.pt-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);}
.pt-row.lit{background:rgba(212,160,23,.12);border-color:rgba(212,160,23,.3);box-shadow:0 0 8px rgba(212,160,23,.1);}
.pt-row.rana-row{border-color:rgba(34,139,34,.3);background:rgba(34,139,34,.06);}
.pt-row.rana-row.lit{background:rgba(34,139,34,.18);border-color:rgba(34,139,34,.5);box-shadow:0 0 12px rgba(34,139,34,.2);}
.pt-pts{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--txt2);}
.pt-mult{font-family:'Abril Fatface',cursive;font-size:.8rem;color:var(--gold2);}
.pt-row.rana-row .pt-mult{color:#4ade80;}
.pt-row.rana-row .pt-pts{color:rgba(74,222,128,.6);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.sbox{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.06);padding:7px 4px;text-align:center;}
.sv{font-family:'DM Mono',monospace;font-size:.88rem;display:block;color:var(--gold);}
.sl{font-family:'Bebas Neue';font-size:.45rem;letter-spacing:3px;color:rgba(255,255,255,.22);display:block;margin-top:1px;}
.sv.pos{color:#4ade80;}.sv.neg{color:#f87171;}

/* HISTORY */
.hist-wrap{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.05);padding:8px 10px;}
.hl{font-family:'Bebas Neue';font-size:.55rem;letter-spacing:4px;color:rgba(255,255,255,.2);display:block;margin-bottom:7px;}
.hdots{display:flex;gap:4px;flex-wrap:wrap;}
.hd{padding:2px 7px;border-radius:3px;font-family:'DM Mono',monospace;font-size:.6rem;animation:hdIn .2s ease both;}
@keyframes hdIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.hw{background:rgba(212,160,23,.14);border:1px solid rgba(212,160,23,.3);color:var(--gold2);}
.hl2{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.18);color:#f87171;}
.hjk{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.28);color:#4ade80;}

/* CONFETTI */
.cf{position:fixed;pointer-events:none;z-index:600;border-radius:2px;animation:cfA var(--dur,2s) ease forwards;}
@keyframes cfA{0%{opacity:1;transform:translateY(0)rotate(0)}100%{opacity:0;transform:translateY(100vh)rotate(720deg)}}

/* TOAST */
.toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:rgba(23,13,6,.97);border:1px solid var(--gold2);color:var(--gold2);font-family:'Bebas Neue';font-size:.85rem;letter-spacing:3px;padding:6px 16px;z-index:700;white-space:nowrap;pointer-events:none;animation:tIn .2s ease both;}
@keyframes tIn{from{opacity:0;transform:translateX(-50%)translateY(-6px)}to{opacity:1;transform:translateX(-50%)translateY(0)}}
.toast.err{border-color:#f87171;color:#f87171;}
</style>
</head>
<body>
<div id="cur"></div><div id="curDot"></div>

<div class="topbar">
  <a href="index.html" class="back">← CASINO</a>
  <span class="top-title">🐸 Juego de la Rana</span>
  <div class="top-coins">🪙 <span id="coinsEl">—</span></div>
</div>

<div class="page">

  <!-- SCORE BANNER -->
  <div class="score-banner">
    <div class="sb-item"><span class="sb-lbl">RONDA</span><span class="sb-val" id="sbRound">1</span></div>
    <div class="sb-sep"></div>
    <div class="sb-item"><span class="sb-lbl">PUNTOS</span><span class="sb-val" id="sbPts">0</span></div>
    <div class="sb-sep"></div>
    <div class="sb-item"><span class="sb-lbl">TIRADAS</span>
      <div class="throws-left">
        <div class="throw-dot" id="dot0"></div>
        <div class="throw-dot" id="dot1"></div>
        <div class="throw-dot" id="dot2"></div>
      </div>
    </div>
    <div class="sb-sep"></div>
    <div class="sb-item"><span class="sb-lbl">MULTIPLICADOR</span><span class="sb-val" id="sbMult">—</span></div>
  </div>

  <!-- CANVAS -->
  <div class="game-wrap" id="gameWrap">
    <canvas id="gameCv"></canvas>
  </div>

  <div class="instruct" id="instruct">
    <b>Arrastra hacia arriba</b> para lanzar la moneda 🪙 · Apunta a los agujeros
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <span class="ctrl-title">◆ APUESTA POR RONDA</span>
    <div class="chip-row">
      <div class="chip ch1"       onclick="selChip(1,this)">1</div>
      <div class="chip ch5"       onclick="selChip(5,this)">5</div>
      <div class="chip ch10 sel"  onclick="selChip(10,this)">10</div>
      <div class="chip ch25"      onclick="selChip(25,this)">25</div>
      <div class="chip ch100"     onclick="selChip(100,this)">100</div>
      <div class="chip ch500"     onclick="selChip(500,this)">500</div>
    </div>
    <div class="bet-row">
      <div class="bet-info">
        <span class="bi-lbl">APUESTA</span>
        <span class="bi-val" id="betEl">10</span>
      </div>
      <div class="bet-info">
        <span class="bi-lbl">CRÉDITOS</span>
        <span class="bi-val" id="balEl">—</span>
      </div>
      <button class="start-btn" id="startBtn" onclick="startRound()">🐸 INICIAR</button>
    </div>
  </div>

  <!-- PAYTABLE -->
  <div class="paytable">
    <span class="pt-title">◆ TABLA DE PREMIOS — PUNTOS TOTALES (3 TIRADAS) ◆</span>
    <div class="pt-grid" id="ptGrid"></div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="sbox"><span class="sv" id="stR">0</span><span class="sl">RONDAS</span></div>
    <div class="sbox"><span class="sv pos" id="stW">0</span><span class="sl">GANAD.</span></div>
    <div class="sbox"><span class="sv neg" id="stL">0</span><span class="sl">PERDID.</span></div>
    <div class="sbox"><span class="sv" id="stNet">0</span><span class="sl">NETO</span></div>
  </div>

  <!-- HISTORY -->
  <div class="hist-wrap">
    <span class="hl">◆ HISTORIAL</span>
    <div class="hdots" id="histEl"></div>
  </div>

</div>

<script>
/* ================================================================
   COINS
================================================================ */
const CKEY='casino_royale_coins';
const Coins={
  get(){const v=parseInt(localStorage.getItem(CKEY));return isNaN(v)?10000:v;},
  set(n){const v=Math.max(0,Math.round(n));localStorage.setItem(CKEY,v);return v;},
  add(n){return this.set(this.get()+n);},
  sub(n){return this.set(this.get()-n);},
  fmt(n){return(n??this.get()).toLocaleString('de-DE');}
};

/* ================================================================
   PAYTABLE DATA
================================================================ */
const PAYOUTS=[
  {min:0,   max:0,   mult:0,   label:'0 pts',      rana:false},
  {min:1,   max:9,   mult:1.5, label:'1 – 9 pts',  rana:false},
  {min:10,  max:24,  mult:2,   label:'10 – 24 pts', rana:false},
  {min:25,  max:49,  mult:3,   label:'25 – 49 pts', rana:false},
  {min:50,  max:99,  mult:5,   label:'50 – 99 pts', rana:false},
  {min:100, max:199, mult:8,   label:'100 – 199 pts',rana:false},
  {min:200, max:349, mult:15,  label:'200 – 349 pts',rana:false},
  {min:350, max:499, mult:25,  label:'350 – 499 pts',rana:false},
  {min:500, max:999, mult:50,  label:'500+ (¡RANA!)',rana:true},
  {min:1000,max:9999,mult:100, label:'1000+ pts',   rana:true},
];

(function buildPaytable(){
  const grid=document.getElementById('ptGrid');
  PAYOUTS.forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='pt-row'+(p.rana?' rana-row':'');
    row.id='ptr-'+i;
    row.innerHTML=`<span class="pt-pts">${p.label}</span><span class="pt-mult">${p.mult>0?'×'+p.mult:'PIERDE'}</span>`;
    grid.appendChild(row);
  });
})();

function litPaytable(score){
  document.querySelectorAll('.pt-row').forEach(r=>r.classList.remove('lit'));
  for(let i=PAYOUTS.length-1;i>=0;i--){
    if(score>=PAYOUTS[i].min){
      document.getElementById('ptr-'+i)?.classList.add('lit');
      document.getElementById('sbMult').textContent='×'+(PAYOUTS[i].mult||0);
      return PAYOUTS[i];
    }
  }
  document.getElementById('sbMult').textContent='×0';
  return PAYOUTS[0];
}

/* ================================================================
   CANVAS SETUP
================================================================ */
const cv=document.getElementById('gameCv');
const ctx=cv.getContext('2d');
const wrap=document.getElementById('gameWrap');

let W=0,H=0;
let BOARD={},LAUNCH={},HOLES=[];
const GRAVITY=650;    // px/s²
const VEL_SCALE=5.2;  // drag px → velocity px/s
const BALL_R=9;
const TRAIL_MAX=16;
const MAX_THROWS=3;

function resize(){
  W=wrap.clientWidth;
  H=Math.round(W*0.75);
  cv.width=W; cv.height=H;
  cv.style.height=H+'px';
  computeLayout();
  if(gameState==='idle') drawScene();
}
window.addEventListener('resize',resize);

function computeLayout(){
  const bx=Math.round(W*0.04), by=Math.round(H*0.03);
  const bw=Math.round(W*0.92), bh=Math.round(H*0.68);
  BOARD={x:bx, y:by, w:bw, h:bh};
  const cx=Math.round(W/2);
  LAUNCH={x:cx, y:H-14};

  const fr_r=Math.round(W*0.065); // frog hole radius (visual & collision)
  const h100r=Math.round(W*0.048);
  const h50r =Math.round(W*0.035);
  const h25r =Math.round(W*0.028);
  const h10r =Math.round(W*0.023);

  HOLES=[
    {x:cx,             y:by+Math.round(bh*0.13), r:fr_r, pts:500, color:'#228B22', label:'RANA',  isFrog:true},
    {x:cx,             y:by+Math.round(bh*0.33), r:h100r,pts:100, color:'#c8902a', label:'100'},
    {x:cx-Math.round(bw*0.18),y:by+Math.round(bh*0.33),r:h50r,pts:50,color:'#b91c1c',label:'50'},
    {x:cx+Math.round(bw*0.18),y:by+Math.round(bh*0.33),r:h50r,pts:50,color:'#b91c1c',label:'50'},
    {x:cx-Math.round(bw*0.30),y:by+Math.round(bh*0.55),r:h25r,pts:25,color:'#1d4ed8',label:'25'},
    {x:cx-Math.round(bw*0.10),y:by+Math.round(bh*0.55),r:h25r,pts:25,color:'#1d4ed8',label:'25'},
    {x:cx+Math.round(bw*0.10),y:by+Math.round(bh*0.55),r:h25r,pts:25,color:'#1d4ed8',label:'25'},
    {x:cx+Math.round(bw*0.30),y:by+Math.round(bh*0.55),r:h25r,pts:25,color:'#1d4ed8',label:'25'},
    {x:cx-Math.round(bw*0.20),y:by+Math.round(bh*0.77),r:h10r, pts:10,color:'#4a5568',label:'10'},
    {x:cx+Math.round(bw*0.20),y:by+Math.round(bh*0.77),r:h10r, pts:10,color:'#4a5568',label:'10'},
  ];
}

/* ================================================================
   STATE
================================================================ */
let gameState='idle'; // idle | round | flying | scoring | done
let coins=Coins.get();
let bet=10;
let roundPts=0;
let throwsLeft=0;
let throwsDone=0;
let raftAnim=null;  // score popup floaters

// Ball physics
let ball={x:0,y:0,vx:0,vy:0,active:false};
let trail=[];

// Aim drag
let dragStart=null,dragNow=null,isDragging=false;

// Score floaters
let floaters=[];

// Frog mouth anim
let frogEating=0; // countdown frames of "eating" animation

// Stats
let stats={r:0,w:0,l:0,net:0};
let history=[];

/* ================================================================
   DRAWING
================================================================ */
function drawScene(){
  ctx.clearRect(0,0,W,H);
  drawBoard();
  drawHoles();
  drawFrog();
  drawBoardFrame();
  drawLaunchZone();
  if(isDragging && gameState==='round') drawAimPreview();
  if(ball.active) drawBall();
  drawFloaters();
}

function drawBoard(){
  // Wood background
  const gBg=ctx.createLinearGradient(BOARD.x,BOARD.y,BOARD.x,BOARD.y+BOARD.h);
  gBg.addColorStop(0,'#1a3a10');gBg.addColorStop(0.5,'#153310');gBg.addColorStop(1,'#102a0c');
  ctx.fillStyle=gBg;
  ctx.beginPath();ctx.roundRect(BOARD.x,BOARD.y,BOARD.w,BOARD.h,6);ctx.fill();

  // Felt texture - subtle horizontal lines
  ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=1;
  for(let y=BOARD.y+4;y<BOARD.y+BOARD.h;y+=8){
    ctx.beginPath();ctx.moveTo(BOARD.x+4,y);ctx.lineTo(BOARD.x+BOARD.w-4,y);ctx.stroke();
  }

  // Diagonal felt grain
  ctx.strokeStyle='rgba(255,255,255,.015)';ctx.lineWidth=1;
  for(let i=-BOARD.h;i<BOARD.w+BOARD.h;i+=20){
    ctx.beginPath();
    ctx.moveTo(BOARD.x+i,BOARD.y);
    ctx.lineTo(BOARD.x+i-BOARD.h,BOARD.y+BOARD.h);
    ctx.stroke();
  }

  // Inner vignette
  const gVig=ctx.createRadialGradient(W/2,BOARD.y+BOARD.h/2,BOARD.w*0.15,W/2,BOARD.y+BOARD.h/2,BOARD.w*0.6);
  gVig.addColorStop(0,'transparent');
  gVig.addColorStop(1,'rgba(0,0,0,.35)');
  ctx.fillStyle=gVig;
  ctx.beginPath();ctx.roundRect(BOARD.x,BOARD.y,BOARD.w,BOARD.h,6);ctx.fill();

  // Wood border strips (decorative)
  const strips=[
    {x:BOARD.x, y:BOARD.y, w:BOARD.w, h:5},
    {x:BOARD.x, y:BOARD.y+BOARD.h-5, w:BOARD.w, h:5},
  ];
  strips.forEach(s=>{
    const g2=ctx.createLinearGradient(s.x,s.y,s.x,s.y+s.h);
    g2.addColorStop(0,'#5a3218');g2.addColorStop(1,'#3a1e0c');
    ctx.fillStyle=g2;ctx.fillRect(s.x,s.y,s.w,s.h);
  });

  // Bottom area (below board) - wood floor
  const gFloor=ctx.createLinearGradient(0,BOARD.y+BOARD.h,0,H);
  gFloor.addColorStop(0,'#2c1810');gFloor.addColorStop(1,'#1a0e08');
  ctx.fillStyle=gFloor;
  ctx.fillRect(0,BOARD.y+BOARD.h,W,H-BOARD.y-BOARD.h);

  // Floor wood grain
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;
  for(let y2=BOARD.y+BOARD.h+6;y2<H;y2+=10){
    ctx.beginPath();ctx.moveTo(0,y2);ctx.lineTo(W,y2);ctx.stroke();
  }
}

function drawBoardFrame(){
  // Gold border
  ctx.strokeStyle='#c8902a';ctx.lineWidth=3;
  ctx.strokeRect(BOARD.x,BOARD.y,BOARD.w,BOARD.h);
  ctx.strokeStyle='rgba(212,160,23,.3)';ctx.lineWidth=1;
  ctx.strokeRect(BOARD.x+3,BOARD.y+3,BOARD.w-6,BOARD.h-6);

  // Corner ornaments
  const corners=[[BOARD.x,BOARD.y],[BOARD.x+BOARD.w,BOARD.y],[BOARD.x,BOARD.y+BOARD.h],[BOARD.x+BOARD.w,BOARD.y+BOARD.h]];
  corners.forEach(([cx2,cy2])=>{
    ctx.fillStyle='#c8902a';
    ctx.beginPath();ctx.arc(cx2,cy2,5,0,Math.PI*2);ctx.fill();
  });
}

function drawHoles(){
  HOLES.forEach(h=>{
    if(h.isFrog) return; // drawn separately

    // Outer ring (wood lip)
    ctx.fillStyle='#1a0e08';
    ctx.beginPath();ctx.arc(h.x,h.y,h.r+5,0,Math.PI*2);ctx.fill();

    // Hole depth gradient
    const gHole=ctx.createRadialGradient(h.x,h.y,0,h.x,h.y,h.r);
    gHole.addColorStop(0,'#000');gHole.addColorStop(0.7,'#0a0a0a');gHole.addColorStop(1,h.color+'44');
    ctx.fillStyle=gHole;
    ctx.beginPath();ctx.arc(h.x,h.y,h.r,0,Math.PI*2);ctx.fill();

    // Color rim
    ctx.strokeStyle=h.color;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(h.x,h.y,h.r,0,Math.PI*2);ctx.stroke();

    // Inner highlight arc
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(h.x,h.y-h.r*0.2,h.r*0.7,Math.PI*1.1,Math.PI*1.9);ctx.stroke();

    // Points label
    ctx.fillStyle=h.color;
    ctx.font=`bold ${Math.round(h.r*0.75)}px "Bebas Neue"`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(h.label,h.x,h.y);
  });
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}

function drawFrog(){
  const fh=HOLES[0]; // frog hole
  const cx=fh.x, cy=fh.y;
  const r=Math.round(W*0.075);
  const eating=frogEating>0;

  // Shadow under frog
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath();ctx.ellipse(cx,cy+r*0.95,r*1.1,r*0.3,0,0,Math.PI*2);ctx.fill();

  // Frog body
  const gBody=ctx.createRadialGradient(cx-r*0.2,cy-r*0.1,0,cx,cy,r*1.3);
  gBody.addColorStop(0,'#3cb043');gBody.addColorStop(0.5,'#228B22');gBody.addColorStop(1,'#145214');
  ctx.fillStyle=gBody;
  ctx.beginPath();ctx.ellipse(cx,cy+r*0.1,r*1.15,r*0.88,0,0,Math.PI*2);ctx.fill();

  // Belly highlight
  ctx.fillStyle='rgba(100,220,100,.12)';
  ctx.beginPath();ctx.ellipse(cx,cy+r*0.2,r*0.65,r*0.55,0,0,Math.PI*2);ctx.fill();

  // Eyes (bumps)
  [-0.52,0.52].forEach(ex=>{
    const ex2=cx+r*ex, ey=cy-r*0.55;
    // Eye bulge
    const gEye=ctx.createRadialGradient(ex2-r*0.06,ey-r*0.1,0,ex2,ey,r*0.38);
    gEye.addColorStop(0,'#55c055');gEye.addColorStop(1,'#1a6a1a');
    ctx.fillStyle=gEye;
    ctx.beginPath();ctx.arc(ex2,ey,r*0.38,0,Math.PI*2);ctx.fill();

    // Pupil
    ctx.fillStyle='#1a1a00';
    ctx.beginPath();ctx.arc(ex2,ey,r*0.2,0,Math.PI*2);ctx.fill();
    // Iris
    ctx.fillStyle='#d4a017';
    ctx.beginPath();ctx.arc(ex2,ey,r*0.13,0,Math.PI*2);ctx.fill();
    // Dark pupil dot
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(ex2+r*0.03,ey,r*0.08,0,Math.PI*2);ctx.fill();
    // Highlight
    ctx.fillStyle='rgba(255,255,255,.75)';
    ctx.beginPath();ctx.arc(ex2-r*0.1,ey-r*0.12,r*0.07,0,Math.PI*2);ctx.fill();

    // Eye outline
    ctx.strokeStyle='#1a5a1a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(ex2,ey,r*0.38,0,Math.PI*2);ctx.stroke();
  });

  // Nostrils
  ctx.fillStyle='#145214';
  [cx-r*0.18,cx+r*0.18].forEach(nx=>{
    ctx.beginPath();ctx.ellipse(nx,cy-r*0.12,r*0.06,r*0.04,0,0,Math.PI*2);ctx.fill();
  });

  // MOUTH (the hole / scoring target)
  // Open mouth
  const mouthOpen=eating?0.2:0.9; // closes when eating
  ctx.fillStyle='#7f1d1d';
  ctx.beginPath();
  ctx.arc(cx,cy+r*0.18,r*0.72,0.05,Math.PI-0.05);
  ctx.closePath();ctx.fill();

  // Tongue
  if(!eating){
    ctx.fillStyle='#ef4444';
    ctx.beginPath();
    ctx.arc(cx,cy+r*0.52,r*0.38,0,Math.PI);
    ctx.fill();
    // tongue tip
    ctx.beginPath();
    ctx.arc(cx-r*0.15,cy+r*0.62,r*0.1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();
    ctx.arc(cx+r*0.15,cy+r*0.62,r*0.1,0,Math.PI*2);ctx.fill();
  }

  // Teeth (upper)
  ctx.fillStyle='#fef8e8';
  const tw=r*0.18,th=r*0.14;
  for(let i=-1;i<=1;i++){
    ctx.beginPath();
    const tx=cx+i*r*0.32;
    ctx.roundRect(tx-tw/2,cy+r*0.1,tw,th*mouthOpen,2);
    ctx.fill();
  }

  // Hole darkness (black circle = the scoring opening)
  const gDark=ctx.createRadialGradient(cx,cy+r*0.28,0,cx,cy+r*0.28,r*0.52);
  gDark.addColorStop(0,'rgba(0,0,0,.95)');gDark.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gDark;
  ctx.beginPath();ctx.arc(cx,cy+r*0.28,r*0.52*mouthOpen,0,Math.PI);ctx.closePath();ctx.fill();

  // Crown
  const crY=cy-r*0.9;
  ctx.fillStyle='#d4a017';
  ctx.beginPath();
  ctx.moveTo(cx-r*0.5,crY);
  ctx.lineTo(cx-r*0.5,crY-r*0.35);
  ctx.lineTo(cx-r*0.2,crY-r*0.2);
  ctx.lineTo(cx,crY-r*0.48);
  ctx.lineTo(cx+r*0.2,crY-r*0.2);
  ctx.lineTo(cx+r*0.5,crY-r*0.35);
  ctx.lineTo(cx+r*0.5,crY);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#b88010';ctx.lineWidth=1.5;
  ctx.stroke();
  // Crown jewels
  ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(cx,crY-r*0.44,r*0.07,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#60a5fa';ctx.beginPath();ctx.arc(cx-r*0.35,crY-r*0.22,r*0.055,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*0.35,crY-r*0.22,r*0.055,0,Math.PI*2);ctx.fill();

  // Feet / front legs
  [-1.08,1.08].forEach(sx=>{
    const lx=cx+r*sx,ly=cy+r*0.5;
    const g3=ctx.createRadialGradient(lx,ly,0,lx,ly,r*0.28);
    g3.addColorStop(0,'#3cb043');g3.addColorStop(1,'#1a6a1a');
    ctx.fillStyle=g3;
    ctx.beginPath();ctx.ellipse(lx,ly,r*0.28,r*0.18,sx>0?0.4:-0.4,0,Math.PI*2);ctx.fill();
    // toes
    ctx.fillStyle='#228B22';
    for(let t=-1;t<=1;t++){
      ctx.beginPath();ctx.arc(lx+t*r*0.1+(sx>0?r*0.1:-r*0.1),ly+r*0.12,r*0.07,0,Math.PI*2);ctx.fill();
    }
  });

  // Body outline
  ctx.strokeStyle='#145214';ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(cx,cy+r*0.1,r*1.15,r*0.88,0,0,Math.PI*2);ctx.stroke();

  // "500" label above frog
  ctx.fillStyle='rgba(240,192,64,.9)';
  ctx.font=`bold ${Math.round(W*0.038)}px "Bebas Neue"`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('500 pts',cx,cy-r*1.35);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  if(frogEating>0) frogEating--;
}

function drawLaunchZone(){

  const gPlat=ctx.createLinearGradient(LAUNCH.x-50,LAUNCH.y-12,LAUNCH.x-50,LAUNCH.y+4);
  gPlat.addColorStop(0,'#5a3218');gPlat.addColorStop(1,'#3a1e0c');
  ctx.fillStyle=gPlat;

  ctx.strokeRect(LAUNCH.x-55,LAUNCH.y-14,110,18);

  // Launch disc
  const gDisc=ctx.createRadialGradient(LAUNCH.x-2,LAUNCH.y-9,0,LAUNCH.x,LAUNCH.y-6,10);

  ctx.fillStyle=gDisc;

function drawAimPreview(){
  if(!dragStart||!dragNow) return;
  const dx=dragNow.x-dragStart.x;
  const dy=dragNow.y-dragStart.y;
  const spd=Math.sqrt(dx*dx+dy*dy);
  if(spd<10) return;
  const vx=dx*VEL_SCALE;
  const vy=dy*VEL_SCALE;

  // Draw trajectory dots
  let px=LAUNCH.x,py=LAUNCH.y-6;
  let pvx=vx,pvy=vy;
  const dt=0.025;
  ctx.save();
  for(let i=0;i<40;i++){
    pvx+=0;pvy+=GRAVITY*dt;
    px+=pvx*dt;py+=pvy*dt;
    if(py<BOARD.y-10||px<BOARD.x-10||px>BOARD.x+BOARD.w+10) break;
    if(py>LAUNCH.y) break;
    const alpha=1-(i/40);
    const r2=Math.max(1.5,4-i*0.08);
    ctx.fillStyle=`rgba(240,192,64,${alpha*0.8})`;
    ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // Power indicator
  const power=Math.min(spd/80,1);
  const barW=80,barH=6;
  const bx2=LAUNCH.x-barW/2,by2=LAUNCH.y-30;
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx2,by2,barW,barH);
  const col=power<0.5?`rgba(255,${Math.round(200+power*110)},0,.9)`:`rgba(${Math.round(255*(1-power*0.5))},200,0,.9)`;
  ctx.fillStyle=col;ctx.fillRect(bx2,by2,Math.round(barW*power),barH);
  ctx.strokeStyle='rgba(212,160,23,.4)';ctx.lineWidth=1;ctx.strokeRect(bx2,by2,barW,barH);
  ctx.fillStyle='rgba(254,248,232,.7)';
  ctx.font=`${Math.round(W*0.022)}px "Bebas Neue"`;
  ctx.textAlign='center';ctx.fillText('POTENCIA',LAUNCH.x,by2-3);
  ctx.textAlign='left';
}

function drawBall(){
  // Trail
  trail.forEach((t,i)=>{
    const alpha=(i/trail.length)*0.5;
    const r2=BALL_R*(i/trail.length)*0.8;
    ctx.fillStyle=`rgba(240,192,64,${alpha})`;
    ctx.beginPath();ctx.arc(t.x,t.y,r2,0,Math.PI*2);ctx.fill();
  });

  // Ball shadow
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.beginPath();ctx.ellipse(ball.x+2,ball.y+4,BALL_R,BALL_R*0.4,0,0,Math.PI*2);ctx.fill();

  // Ball (gold coin)
  const gBall=ctx.createRadialGradient(ball.x-BALL_R*0.3,ball.y-BALL_R*0.3,0,ball.x,ball.y,BALL_R);
  gBall.addColorStop(0,'#f0e060');gBall.addColorStop(0.4,'#d4a017');gBall.addColorStop(1,'#7a5010');
  ctx.fillStyle=gBall;
  ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);ctx.fill();

  // Coin detail
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R*0.55,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.2)';
  ctx.beginPath();ctx.arc(ball.x-BALL_R*0.3,ball.y-BALL_R*0.3,BALL_R*0.2,0,Math.PI*2);ctx.fill();
}

function drawFloaters(){
  floaters=floaters.filter(f=>f.life>0);
  floaters.forEach(f=>{
    const alpha=f.life/60;
    ctx.fillStyle=f.color+Math.round(alpha*255).toString(16).padStart(2,'0');
    ctx.font=`bold ${Math.round(W*0.065*f.scale)}px "Abril Fatface"`;
    ctx.textAlign='center';
    ctx.shadowColor=f.color;ctx.shadowBlur=10*alpha;
    ctx.fillText(f.text,f.x,f.y);
    ctx.shadowBlur=0;
    f.y-=1.2;f.life--;f.scale=Math.min(1,f.scale+0.04);
    ctx.textAlign='left';
  });
}

/* ================================================================
   PHYSICS LOOP
================================================================ */
let lastT=0,raf=null;

function physicsLoop(t){
  const dt=Math.min((t-lastT)/1000,0.04);
  lastT=t;

  if(ball.active){
    // Update trail
    trail.push({x:ball.x,y:ball.y});
    if(trail.length>TRAIL_MAX) trail.shift();

    // Update position
    ball.vy+=GRAVITY*dt;
    ball.x+=ball.vx*dt;
    ball.y+=ball.vy*dt;

    // Check hole collisions (while in board zone, going upward or just entered)
    if(ball.y<BOARD.y+BOARD.h && ball.y>BOARD.y-BALL_R*2 &&
       ball.x>BOARD.x && ball.x<BOARD.x+BOARD.w){
      for(const h of HOLES){
        const dx=ball.x-h.x, dy=ball.y-h.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<h.r-BALL_R*0.5){
          onHoleHit(h);
          raf=null;return;
        }
      }
    }

    // Miss conditions
    const missedBoard=(ball.y>BOARD.y+BOARD.h && ball.vy>0)||(ball.y>LAUNCH.y)||(ball.x<BOARD.x-20||ball.x>BOARD.x+BOARD.w+20);
    const wentOver=ball.y<BOARD.y-20;
    if(missedBoard||wentOver){
      onMiss();raf=null;return;
    }
  }

  drawScene();
  raf=requestAnimationFrame(physicsLoop);
}

function onHoleHit(h){
  ball.active=false;trail=[];
  roundPts+=h.pts;
  document.getElementById('sbPts').textContent=roundPts;

  floaters.push({
    x:h.x, y:h.y, text:'+'+h.pts,
    color:h.isFrog?'#4ade80':'#f0c040',
    life:60, scale:0.5
  });

  if(h.isFrog){
    frogEating=25;
    // extra floater
    setTimeout(()=>floaters.push({x:W/2,y:H/2,text:'¡RANA!',color:'#4ade80',life:90,scale:0.3}),200);
  }

  litPaytable(roundPts);
  nextThrow();
}

function onMiss(){
  ball.active=false;trail=[];
  floaters.push({x:LAUNCH.x,y:LAUNCH.y-40,text:'FALLO',color:'#f87171',life:45,scale:0.5});
  nextThrow();
}

function nextThrow(){
  throwsDone++;
  const dotIdx=throwsDone-1;
  if(dotIdx<3) document.getElementById('dot'+dotIdx).classList.add('used');

  drawScene();

  if(throwsDone>=MAX_THROWS){
    setTimeout(endRound,800);
  } else {
    gameState='round';
    drawScene();
    raf=requestAnimationFrame(physicsLoop);
  }
}

/* ================================================================
   LAUNCH
================================================================ */
function launch(){
  if(!dragStart||!dragNow) return;
  const dx=dragNow.x-dragStart.x;
  const dy=dragNow.y-dragStart.y;
  if(Math.sqrt(dx*dx+dy*dy)<8) return;

  const vx=dx*VEL_SCALE;
  const vy=dy*VEL_SCALE;

  // Only accept upward launches
  if(vy>=0){
    toast('Arrastra hacia arriba para lanzar','err');
    isDragging=false;dragStart=null;dragNow=null;
    return;
  }

  ball={x:LAUNCH.x, y:LAUNCH.y-6, vx, vy, active:true};
  trail=[];
  isDragging=false;dragStart=null;dragNow=null;
  gameState='flying';

  if(raf) cancelAnimationFrame(raf);
  lastT=performance.now();
  raf=requestAnimationFrame(physicsLoop);
}

/* ================================================================
   INPUT (touch + mouse)
================================================================ */
function getPos(e,touch=false){
  const rect=cv.getBoundingClientRect();
  const src=touch?e.touches[0]:e;
  return {
    x:(src.clientX-rect.left)*(W/rect.width),
    y:(src.clientY-rect.top)*(H/rect.height)
  };
}

function onPointerDown(e,touch){
  if(gameState!=='round') return;
  if(touch) e.preventDefault();
  const p=getPos(e,touch);
  isDragging=true;
  dragStart={...p};dragNow={...p};
}
function onPointerMove(e,touch){
  if(!isDragging) return;
  if(touch) e.preventDefault();
  dragNow=getPos(e,touch);
}
function onPointerUp(e,touch){
  if(!isDragging) return;
  if(touch) e.preventDefault();
  if(gameState==='round') launch();
  isDragging=false;
}

cv.addEventListener('touchstart',e=>onPointerDown(e,true),{passive:false});
cv.addEventListener('touchmove', e=>onPointerMove(e,true),{passive:false});
cv.addEventListener('touchend',  e=>onPointerUp(e,true),  {passive:false});
cv.addEventListener('mousedown', e=>onPointerDown(e,false));
cv.addEventListener('mousemove', e=>onPointerMove(e,false));
cv.addEventListener('mouseup',   e=>onPointerUp(e,false));

/* ================================================================
   ROUND MANAGEMENT
================================================================ */
function startRound(){
  if(bet>coins){toast('Fichas insuficientes','err');return;}
  if(bet<1){toast('Selecciona apuesta','err');return;}

  coins=Coins.sub(bet);
  animCoins(coins+bet,coins);

  roundPts=0;throwsDone=0;throwsLeft=MAX_THROWS;
  document.getElementById('sbPts').textContent='0';
  document.getElementById('sbMult').textContent='—';
  document.querySelectorAll('.throw-dot').forEach(d=>d.classList.remove('used'));
  document.querySelectorAll('.pt-row').forEach(r=>r.classList.remove('lit'));

  document.getElementById('startBtn').disabled=true;
  document.querySelectorAll('.chip').forEach(c=>c.disabled=true);

  floaters=[];trail=[];ball.active=false;
  frogEating=0;

  gameState='round';
  document.getElementById('instruct').innerHTML='<b>Arrastra hacia arriba</b> y suelta para lanzar · Tiradas restantes: <b>'+(MAX_THROWS-throwsDone)+'</b>';

  if(raf) cancelAnimationFrame(raf);
  lastT=performance.now();
  raf=requestAnimationFrame(physicsLoop);
}

function endRound(){
  gameState='done';

  const pay=litPaytable(roundPts);
  stats.r++;

  if(pay.mult>0){
    const won=Math.floor(bet*pay.mult);
    const net=won-bet;
    coins=Coins.add(won);
    animCoins(coins-won,coins);
    stats.w++;stats.net+=net;
    history.unshift({won:true,pts:roundPts,rana:roundPts>=500});
    document.getElementById('instruct').innerHTML=
      `🏆 <b>+${Coins.fmt(won)} fichas</b> (×${pay.mult}) · ${roundPts} puntos`;
    if(roundPts>=200) confetti(roundPts>=500?80:45);
  } else {
    stats.l++;stats.net-=bet;
    history.unshift({won:false,pts:roundPts,rana:false});
    document.getElementById('instruct').innerHTML=`😔 Sin premio · ${roundPts} puntos · Próxima vez...`;
  }

  updateStats();
  renderHistory();

  document.getElementById('startBtn').disabled=false;
  document.getElementById('startBtn').textContent='🐸 NUEVA RONDA';
  document.querySelectorAll('.chip').forEach(c=>c.disabled=false);

  if(raf) cancelAnimationFrame(raf);
  raf=requestAnimationFrame(physicsLoop); // keep drawing floaters
}

   BET CONTROLS
================================================================ */
function selChip(v,el){
  bet=v;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('betEl').textContent=Coins.fmt(bet);
}

/* ================================================================
   STATS & HISTORY
================================================================ */
function updateStats(){
  document.getElementById('stR').textContent=stats.r;
  document.getElementById('stW').textContent=stats.w;
  document.getElementById('stL').textContent=stats.l;
  const n=document.getElementById('stNet');
  n.textContent=(stats.net>=0?'+':'')+Coins.fmt(stats.net);
  n.className='sv '+(stats.net>0?'pos':stats.net<0?'neg':'');
}
function renderHistory(){
  if(history.length>20) history.length=20;
  document.getElementById('histEl').innerHTML=history.map(h=>{
    const cls=h.rana?'hjk':h.won?'hw':'hl2';
    return `<div class="hd ${cls}">${h.pts}pts</div>`;
  }).join('');
}

/* ================================================================
   EFFECTS
================================================================ */
function confetti(n=40){
  const cols=['#d4a017','#f0c040','#4ade80','#fff','#f87171','#60a5fa'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');c.className='cf';
    c.style.cssText=`left:${5+Math.random()*90}vw;top:-10px;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${cols[i%cols.length]};--dur:${1.5+Math.random()*.9}s;animation-delay:${Math.random()*.5}s;`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),3000);
  }
}
function toast(msg,type=''){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='toast '+(type||'');el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2400);
}

/* ================================================================
   COINS ANIMATION
================================================================ */
function animCoins(from,to){
  const dur=500,t0=performance.now();
  function step(now){
    const t=Math.min((now-t0)/dur,1),e=1-Math.pow(1-t,3);
    const v=Math.round(from+(to-from)*e);
    document.getElementById('coinsEl').textContent=Coins.fmt(v);
    document.getElementById('balEl').textContent=Coins.fmt(v);
    if(t<1) requestAnimationFrame(step);
    else{document.getElementById('coinsEl').textContent=Coins.fmt(to);document.getElementById('balEl').textContent=Coins.fmt(to);}
  }
  requestAnimationFrame(step);
}

/* ================================================================

================================================================ */
const curEl=document.getElementById('cur'),curDot=document.getElementById('curDot');
let mx=0,my=0,ccx=0,ccy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curDot.style.left=mx+'px';curDot.style.top=my+'px';});
(function loop(){ccx+=(mx-ccx)*.14;ccy+=(my-ccy)*.14;curEl.style.left=ccx+'px';curEl.style.top=ccy+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('button,a,.chip').forEach(el=>{
  el.addEventListener('mouseenter',()=>curEl.classList.add('h'));
  el.addEventListener('mouseleave',()=>curEl.classList.remove('h'));
});
