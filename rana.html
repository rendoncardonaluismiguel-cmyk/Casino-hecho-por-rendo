<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Juego de la Rana — Casino Royale</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,600;1,400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#110a04;--wood:#3c1e08;--wood2:#2a1506;--wood3:#4e2c14;--wood4:#5c3418;
  --felt:#0e3a0e;--gold:#d4a017;--gold2:#f0c040;--gold3:#a87810;
  --cream:#fef8e8;--red-h:#b91c1c;--red2:#7f1d1d;--green2:#4ade80;
  --txt:rgba(254,248,232,.9);--txt2:rgba(254,248,232,.4);--border:rgba(212,160,23,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);}
body{font-family:'Crimson Pro',serif;color:var(--cream);cursor:none;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 0%,rgba(80,40,10,.22),transparent 70%);}

#cur{width:20px;height:20px;border:1.5px solid var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .07s;box-shadow:0 0 8px rgba(212,160,23,.5);}
#curDot{width:4px;height:4px;background:var(--gold2);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cur.h{transform:translate(-50%,-50%) scale(2.1);background:rgba(212,160,23,.07);}

.topbar{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(17,10,4,.98);border-bottom:2px solid rgba(212,160,23,.18);}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.35;}
.back{font-family:'Bebas Neue';font-size:.8rem;letter-spacing:2px;color:var(--txt2);text-decoration:none;cursor:none;transition:color .2s;}
.back:hover{color:var(--gold2);}
.top-title{font-family:'Abril Fatface',cursive;font-size:1rem;color:var(--gold2);text-shadow:0 0 14px rgba(240,192,64,.3);}
.top-coins{display:flex;align-items:center;gap:5px;background:rgba(212,160,23,.07);border:1px solid var(--border);padding:4px 12px;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--gold2);white-space:nowrap;}

.page{max-width:490px;margin:0 auto;padding:8px 8px 28px;display:flex;flex-direction:column;gap:8px;position:relative;z-index:1;}

.score-banner{background:linear-gradient(180deg,var(--wood2),var(--wood));border:2px solid var(--gold3);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;}
.score-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.sb-lbl{font-family:'Bebas Neue';font-size:.52rem;letter-spacing:4px;color:var(--txt2);}
.sb-val{font-family:'Abril Fatface',cursive;font-size:1.4rem;color:var(--gold2);text-shadow:0 0 10px rgba(240,192,64,.3);line-height:1.1;}
.sb-sep{width:1px;height:36px;background:rgba(212,160,23,.18);}
.throw-dots{display:flex;gap:5px;align-items:center;}
.tdot{width:13px;height:13px;border-radius:50%;background:var(--gold2);box-shadow:0 0 7px rgba(240,192,64,.5);transition:all .25s;}
.tdot.used{background:rgba(255,255,255,.1);box-shadow:none;}

.game-wrap{border:3px solid var(--wood4);box-shadow:0 6px 32px rgba(0,0,0,.7),inset 0 0 20px rgba(0,0,0,.4);position:relative;overflow:hidden;background:var(--wood2);touch-action:none;cursor:none;}
#gameCv{display:block;width:100%;touch-action:none;}

.instruct{font-style:italic;font-size:.85rem;text-align:center;color:var(--txt2);padding:5px 8px;background:rgba(0,0,0,.45);border:1px solid rgba(212,160,23,.1);letter-spacing:.5px;}
.instruct b{color:var(--gold2);}

.controls{background:var(--wood);border:1px solid var(--border);padding:10px 10px 12px;}
.ctrl-title{font-family:'Bebas Neue';font-size:.55rem;letter-spacing:5px;color:var(--txt2);display:block;margin-bottom:8px;}

.chip-row{display:flex;gap:7px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
.chip{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:.7rem;cursor:none;transition:.18s;position:relative;flex-shrink:0;box-shadow:0 3px 8px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.15);}
.chip::before{content:'';position:absolute;inset:3px;border-radius:50%;border:2px dashed rgba(255,255,255,.25);}
.chip:hover,.chip.sel{transform:translateY(-4px) scale(1.12);}
.chip.sel{outline:2px solid var(--gold2);outline-offset:2px;box-shadow:0 3px 8px rgba(0,0,0,.7),0 0 14px rgba(212,160,23,.4);}
.ch1{background:radial-gradient(circle at 35% 35%,#888,#333);}
.ch5{background:radial-gradient(circle at 35% 35%,#e55,#900);}
.ch10{background:radial-gradient(circle at 35% 35%,#55e,#009);}
.ch25{background:radial-gradient(circle at 35% 35%,#5c5,#090);}
.ch100{background:radial-gradient(circle at 35% 35%,#eb6,#840);}
.ch500{background:radial-gradient(circle at 35% 35%,#b5e,#609);}

.bet-row{display:flex;gap:8px;align-items:stretch;}
.bet-info{flex:1;background:rgba(0,0,0,.5);border:1px solid rgba(212,160,23,.12);padding:8px 10px;display:flex;flex-direction:column;justify-content:center;}
.bi-lbl{font-family:'Bebas Neue';font-size:.5rem;letter-spacing:4px;color:var(--txt2);}
.bi-val{font-family:'DM Mono',monospace;font-size:.92rem;color:var(--gold2);}

/* ── LAUNCH BUTTON ── */
.lbtn-wrap{flex:2;}
.lbtn{
  width:100%;height:70px;position:relative;cursor:none;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#5a2010,#2e1006);
  border:2px solid var(--gold3);
  border-radius:10px;
  box-shadow:0 6px 0 #180800,0 8px 20px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,120,40,.18);
  overflow:hidden;transition:all .12s;
}
.lbtn::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,140,60,.13),transparent);border-radius:8px 8px 0 0;pointer-events:none;}
.lbtn:active,.lbtn.pressed{transform:translateY(5px);box-shadow:0 1px 0 #180800,0 2px 8px rgba(0,0,0,.5);}
.lbtn:disabled{opacity:.3;}
.lbtn-gem{
  width:62%;height:62%;background:radial-gradient(ellipse at 38% 30%,#d43010,#8a1a08);
  border-radius:8px;border:1px solid rgba(255,90,40,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  box-shadow:inset 0 2px 5px rgba(255,100,40,.2),0 2px 8px rgba(0,0,0,.6);
  position:relative;z-index:1;
}
.lbtn-gem::after{content:'';position:absolute;top:0;left:12%;right:12%;height:38%;background:linear-gradient(180deg,rgba(255,180,120,.18),transparent);border-radius:6px 6px 0 0;}
.lbtn-icon{font-size:1.3rem;line-height:1;}
.lbtn-label{font-family:'Abril Fatface',cursive;font-size:.72rem;letter-spacing:3px;color:var(--gold2);text-shadow:0 0 8px rgba(240,192,64,.5);white-space:nowrap;}
/* Decorative rivets */
.lbtn-rivets{position:absolute;inset:0;pointer-events:none;}
.lbtn-rivets::before,.lbtn-rivets::after{content:'◉';position:absolute;font-size:9px;color:var(--gold3);top:50%;transform:translateY(-50%);}
.lbtn-rivets::before{left:8px;}.lbtn-rivets::after{right:8px;}

.paytable{background:rgba(0,0,0,.5);border:1px solid var(--border);padding:10px 12px;}
.pt-title{font-family:'Bebas Neue';font-size:.55rem;letter-spacing:5px;color:var(--txt2);display:block;margin-bottom:8px;text-align:center;}
.pt-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.pt-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);transition:all .2s;}
.pt-row.lit{background:rgba(212,160,23,.12);border-color:rgba(212,160,23,.3);}
.pt-row.rana-row{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.04);}
.pt-row.rana-row.lit{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.5);box-shadow:0 0 10px rgba(34,197,94,.15);}
.pt-pts{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--txt2);}
.pt-mult{font-family:'Abril Fatface',cursive;font-size:.78rem;color:var(--gold2);}
.pt-row.rana-row .pt-mult{color:var(--green2);}
.pt-row.rana-row .pt-pts{color:rgba(74,222,128,.55);}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.sbox{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.05);padding:7px 4px;text-align:center;}
.sv{font-family:'DM Mono',monospace;font-size:.88rem;display:block;color:var(--gold);}
.sl{font-family:'Bebas Neue';font-size:.44rem;letter-spacing:3px;color:rgba(255,255,255,.22);display:block;margin-top:1px;}
.sv.pos{color:var(--green2);}.sv.neg{color:#f87171;}

.hist-wrap{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.05);padding:8px 10px;}
.hl{font-family:'Bebas Neue';font-size:.55rem;letter-spacing:4px;color:rgba(255,255,255,.2);display:block;margin-bottom:7px;}
.hdots{display:flex;gap:4px;flex-wrap:wrap;}
.hd{padding:2px 7px;border-radius:3px;font-family:'DM Mono',monospace;font-size:.6rem;animation:hdIn .2s ease both;}
@keyframes hdIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.hw{background:rgba(212,160,23,.14);border:1px solid rgba(212,160,23,.3);color:var(--gold2);}
.hl2{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.18);color:#f87171;}
.hjk{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.28);color:var(--green2);}

.cf{position:fixed;pointer-events:none;z-index:600;border-radius:2px;animation:cfA var(--dur,2s) ease forwards;}
@keyframes cfA{0%{opacity:1;transform:translateY(0)rotate(0)}100%{opacity:0;transform:translateY(100vh)rotate(720deg)}}
.toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:rgba(17,10,4,.97);border:1px solid var(--gold2);color:var(--gold2);font-family:'Bebas Neue';font-size:.85rem;letter-spacing:3px;padding:6px 16px;z-index:700;white-space:nowrap;pointer-events:none;animation:tIn .2s ease both;}
@keyframes tIn{from{opacity:0;transform:translateX(-50%)translateY(-6px)}to{opacity:1;transform:translateX(-50%)translateY(0)}}
.toast.err{border-color:#f87171;color:#f87171;}
</style>
</head>
<body>
<div id="cur"></div><div id="curDot"></div>

<div class="topbar">
  <a href="index.html" class="back">← CASINO</a>
  <span class="top-title">🐸 Juego de la Rana</span>
  <div class="top-coins">🪙 <span id="coinsEl">—</span></div>
</div>

<div class="page">

  <div class="score-banner">
    <div class="sb-item"><span class="sb-lbl">RONDA</span><span class="sb-val" id="sbRound">1</span></div>
    <div class="sb-sep"></div>
    <div class="sb-item"><span class="sb-lbl">PUNTOS</span><span class="sb-val" id="sbPts">0</span></div>
    <div class="sb-sep"></div>
    <div class="sb-item"><span class="sb-lbl">AROS</span>
      <div class="throw-dots">
        <div class="tdot" id="dot0"></div>
        <div class="tdot" id="dot1"></div>
        <div class="tdot" id="dot2"></div>
      </div>
    </div>
    <div class="sb-sep"></div>
    <div class="sb-item"><span class="sb-lbl">PREMIO</span><span class="sb-val" id="sbMult">—</span></div>
  </div>

  <div class="game-wrap" id="gameWrap">
    <canvas id="gameCv"></canvas>
  </div>

  <div class="instruct" id="instruct">
    <b>Arrastra hacia arriba</b> en el tablero o en el botón · Suelta para lanzar el aro
  </div>

  <div class="controls">
    <span class="ctrl-title">◆ APUESTA POR RONDA</span>
    <div class="chip-row">
      <div class="chip ch1"        onclick="selChip(1,this)">1</div>
      <div class="chip ch5"        onclick="selChip(5,this)">5</div>
      <div class="chip ch10 sel"   onclick="selChip(10,this)">10</div>
      <div class="chip ch25"       onclick="selChip(25,this)">25</div>
      <div class="chip ch100"      onclick="selChip(100,this)">100</div>
      <div class="chip ch500"      onclick="selChip(500,this)">500</div>
    </div>
    <div class="bet-row">
      <div class="bet-info"><span class="bi-lbl">APUESTA</span><span class="bi-val" id="betEl">10</span></div>
      <div class="bet-info"><span class="bi-lbl">CRÉDITOS</span><span class="bi-val" id="balEl">—</span></div>
      <div class="lbtn-wrap">
        <button class="lbtn" id="launchBtn">
          <div class="lbtn-gem">
            <span class="lbtn-icon" id="lbtnIcon">🐸</span>
            <span class="lbtn-label" id="lbtnLabel">INICIAR</span>
          </div>
          <div class="lbtn-rivets"></div>
        </button>
      </div>
    </div>
  </div>

  <div class="paytable">
    <span class="pt-title">◆ TABLA DE PREMIOS — PUNTOS TOTALES (3 AROS) ◆</span>
    <div class="pt-grid" id="ptGrid"></div>
  </div>

  <div class="stats-row">
    <div class="sbox"><span class="sv" id="stR">0</span><span class="sl">RONDAS</span></div>
    <div class="sbox"><span class="sv pos" id="stW">0</span><span class="sl">GANAD.</span></div>
    <div class="sbox"><span class="sv neg" id="stL">0</span><span class="sl">PERDID.</span></div>
    <div class="sbox"><span class="sv" id="stNet">0</span><span class="sl">NETO</span></div>
  </div>

  <div class="hist-wrap">
    <span class="hl">◆ HISTORIAL</span>
    <div class="hdots" id="histEl"></div>
  </div>

</div>

<script>
/* ─── COINS ───────────────────────────────────────────── */
const CKEY='casino_royale_coins';
const Coins={
  get(){const v=parseInt(localStorage.getItem(CKEY));return isNaN(v)?10000:v;},
  set(n){const v=Math.max(0,Math.round(n));localStorage.setItem(CKEY,v);return v;},
  add(n){return this.set(this.get()+n);},
  sub(n){return this.set(this.get()-n);},
  fmt(n){return(n??this.get()).toLocaleString('de-DE');}
};

/* ─── PAYTABLE ─────────────────────────────────────────── */
const PAYOUTS=[
  {min:0,   mult:0,   label:'0 pts'},
  {min:1,   mult:1.5, label:'1 – 49 pts'},
  {min:50,  mult:2,   label:'50 – 99 pts'},
  {min:100, mult:4,   label:'100 – 199 pts'},
  {min:200, mult:7,   label:'200 – 399 pts'},
  {min:400, mult:12,  label:'400 – 599 pts'},
  {min:600, mult:20,  label:'600 – 899 pts'},
  {min:900, mult:35,  label:'900 – 1199 pts', rana:true},
  {min:1200,mult:60,  label:'1200+ pts',      rana:true},
  {min:2000,mult:100, label:'2000+ ¡RANA!',   rana:true},
];
(()=>{
  const g=document.getElementById('ptGrid');
  PAYOUTS.forEach((p,i)=>{
    const r=document.createElement('div');
    r.className='pt-row'+(p.rana?' rana-row':'');r.id='ptr-'+i;
    r.innerHTML=`<span class="pt-pts">${p.label}</span><span class="pt-mult">${p.mult>0?'×'+p.mult:'PIERDE'}</span>`;
    g.appendChild(r);
  });
})();
function litPaytable(score){
  document.querySelectorAll('.pt-row').forEach(r=>r.classList.remove('lit'));
  let best=PAYOUTS[0];
  for(let i=PAYOUTS.length-1;i>=0;i--){if(score>=PAYOUTS[i].min){best=PAYOUTS[i];document.getElementById('ptr-'+i)?.classList.add('lit');break;}}
  document.getElementById('sbMult').textContent=best.mult>0?'×'+best.mult:'×0';
  return best;
}

/* ─── CANVAS ───────────────────────────────────────────── */
const cv=document.getElementById('gameCv');
const ctx=cv.getContext('2d');
const wrap=document.getElementById('gameWrap');
let W=0,H=0;

/* ─── PERSPECTIVE BOARD ────────────────────────────────── */
// Board (u,v): u=0..1 horiz, v=0..1 depth (0=near/player, 1=far/frog-back)
let PB={};
function computePB(){
  const mx=Math.round(W*0.025);
  PB={
    cx:W/2,
    top:Math.round(H*0.03),
    bot:Math.round(H*0.74),
    nearW:W-mx*2,
    farW:Math.round(W*0.40),
  };
  PB.H=PB.bot-PB.top;
}
// Board coords → screen coords + scale factor
function b2s(u,v){
  const w=PB.nearW+(PB.farW-PB.nearW)*v;
  const x=PB.cx+(u-0.5)*w;
  const y=PB.bot-(PB.H)*v;
  const sc=0.25+0.75*(1-v);
  return{x,y,sc};
}

/* ─── HOLES ────────────────────────────────────────────── */
// Frog body center in board-space
const FROG={u:0.5, v:0.84};
// Frog mouth is slightly in FRONT of frog body
const MOUTH_V = 0.76;
const MOUTH_U = 0.5;
const MOUTH_R = 0.036; // tight radius in board-space

const HOLES=[
  // near row
  {u:0.22,v:0.28,pts:200,  color:'#1d4ed8',label:'200'},
  {u:0.78,v:0.28,pts:200,  color:'#1d4ed8',label:'200'},
  // mid row
  {u:0.12,v:0.46,pts:50,   color:'#4a5568',label:'50'},
  {u:0.36,v:0.44,pts:400,  color:'#c2410c',label:'400'},
  {u:0.64,v:0.44,pts:400,  color:'#c2410c',label:'400'},
  {u:0.88,v:0.46,pts:50,   color:'#4a5568',label:'50'},
  // far row
  {u:0.22,v:0.60,pts:500,  color:'#0369a1',label:'500'},
  {u:0.78,v:0.60,pts:500,  color:'#0369a1',label:'500'},
  // frog mouth — special precise target
  {u:MOUTH_U, v:MOUTH_V, pts:1000, color:'#228B22', label:'RANA', isFrog:true, r:MOUTH_R},
];

/* ─── STATE ────────────────────────────────────────────── */
const FRICTION_U=2.4, FRICTION_V=1.15, MAX_THROWS=3;
let ring={u:.5,v:.06,vu:0,vv:0,active:false,spin:0};
let trail=[], floaters=[], frogEat=0;
let raf=null, lastT=0;
let gameState='idle'; // idle|round|flying|done
let roundPts=0, throwsDone=0;
let coins=Coins.get(), bet=10;
let stats={r:0,w:0,l:0,net:0}, history=[], roundNum=1;

/* ─── RESIZE ───────────────────────────────────────────── */
function resize(){
  W=wrap.clientWidth; H=Math.round(W*0.84);
  cv.width=W; cv.height=H; cv.style.height=H+'px';
  computePB();
  if(gameState==='idle'||gameState==='done') drawAll();
}
window.addEventListener('resize',resize);

/* ─── DRAW ─────────────────────────────────────────────── */
function drawAll(){
  ctx.clearRect(0,0,W,H);
  drawBG();
  drawFelt();
  drawHoles();
  drawFrog();
  drawRails();
  drawFrontEdge();
  drawRing();
  drawFloaters();
}

function drawBG(){
  // Sky/wall behind board
  const g=ctx.createLinearGradient(0,0,0,PB.top+8);
  g.addColorStop(0,'#1a0e04');g.addColorStop(1,'#2e1a0a');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,PB.top+8);
  // Floor below board
  const g2=ctx.createLinearGradient(0,PB.bot,0,H);
  g2.addColorStop(0,'#3c1e08');g2.addColorStop(1,'#1a0e04');
  ctx.fillStyle=g2;ctx.fillRect(0,PB.bot,W,H-PB.bot);
  ctx.strokeStyle='rgba(0,0,0,.22)';ctx.lineWidth=1;
  for(let y2=PB.bot+8;y2<H;y2+=9){ctx.beginPath();ctx.moveTo(0,y2);ctx.lineTo(W,y2);ctx.stroke();}
}

function feltPath(){
  const{cx,top,bot,nearW,farW}=PB;
  ctx.beginPath();
  ctx.moveTo(cx-nearW/2,bot); ctx.lineTo(cx+nearW/2,bot);
  ctx.lineTo(cx+farW/2,top);  ctx.lineTo(cx-farW/2,top);
  ctx.closePath();
}

function drawFelt(){
  ctx.save();feltPath();ctx.clip();

  // Green felt gradient
  const g=ctx.createLinearGradient(PB.cx,PB.top,PB.cx,PB.bot);
  g.addColorStop(0,'#0a2a0a');g.addColorStop(.5,'#0e3a0e');g.addColorStop(1,'#143c14');
  ctx.fillStyle=g;feltPath();ctx.fill();

  // Horizontal perspective lines
  ctx.strokeStyle='rgba(0,0,0,.09)';ctx.lineWidth=1;
  for(let vi=0;vi<=1;vi+=0.045){
    const a=b2s(0,vi),b=b2s(1,vi);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }
  // Vertical perspective lines
  ctx.strokeStyle='rgba(0,0,0,.06)';
  for(let ui=0;ui<=1;ui+=0.12){
    const a=b2s(ui,0),b=b2s(ui,1);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }

  // Vignette
  const gv=ctx.createRadialGradient(PB.cx,(PB.top+PB.bot)/2,PB.nearW*.08,PB.cx,(PB.top+PB.bot)/2,PB.nearW*.72);
  gv.addColorStop(0,'transparent');gv.addColorStop(1,'rgba(0,0,0,.42)');
  ctx.fillStyle=gv;feltPath();ctx.fill();

  ctx.restore();
}

function drawRails(){
  const{cx,top,bot,nearW,farW}=PB;
  const rw=Math.round(W*0.022);

  ctx.save();

  // Left rail
  const lg=ctx.createLinearGradient(cx-nearW/2-rw,0,cx-nearW/2+2,0);
  lg.addColorStop(0,'#1e0e04');lg.addColorStop(1,'#5c3418');
  ctx.fillStyle=lg;
  ctx.beginPath();
  ctx.moveTo(cx-nearW/2,bot+3);ctx.lineTo(cx-nearW/2-rw,bot+6);
  ctx.lineTo(cx-farW/2-rw*.25,top-3);ctx.lineTo(cx-farW/2,top);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#d4a017';ctx.lineWidth=1.5;ctx.stroke();

  // Right rail
  const rg=ctx.createLinearGradient(cx+nearW/2-2,0,cx+nearW/2+rw,0);
  rg.addColorStop(0,'#5c3418');rg.addColorStop(1,'#1e0e04');
  ctx.fillStyle=rg;
  ctx.beginPath();
  ctx.moveTo(cx+nearW/2,bot+3);ctx.lineTo(cx+nearW/2+rw,bot+6);
  ctx.lineTo(cx+farW/2+rw*.25,top-3);ctx.lineTo(cx+farW/2,top);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#d4a017';ctx.lineWidth=1.5;ctx.stroke();

  // Back wall
  const bh=Math.round(H*0.06);
  const bg2=ctx.createLinearGradient(0,top-bh,0,top);
  bg2.addColorStop(0,'#1e0e04');bg2.addColorStop(1,'#4e2c14');
  ctx.fillStyle=bg2;
  ctx.beginPath();
  ctx.moveTo(cx-farW/2,top);ctx.lineTo(cx+farW/2,top);
  ctx.lineTo(cx+farW/2,top-bh);ctx.lineTo(cx-farW/2,top-bh);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#c8902a';ctx.lineWidth=2;ctx.stroke();

  // Gold trim border
  ctx.strokeStyle='#c8902a';ctx.lineWidth=3;
  feltPath();ctx.stroke();

  // Corner ornaments
  [[cx-farW/2,top],[cx+farW/2,top]].forEach(([x,y])=>{
    ctx.fillStyle='#c8902a';ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6a4010';ctx.beginPath();ctx.arc(x,y,2.2,0,Math.PI*2);ctx.fill();
  });

  ctx.restore();
}

function drawFrontEdge(){
  const{cx,bot,nearW}=PB;
  const eh=Math.round(H*0.075);
  const g=ctx.createLinearGradient(0,bot,0,bot+eh);
  g.addColorStop(0,'#5c3418');g.addColorStop(.5,'#4a2810');g.addColorStop(1,'#2a1408');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(cx-nearW/2,bot);ctx.lineTo(cx+nearW/2,bot);
  ctx.lineTo(cx+nearW/2,bot+eh);ctx.lineTo(cx-nearW/2,bot+eh);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#c8902a';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx-nearW/2,bot);ctx.lineTo(cx+nearW/2,bot);ctx.stroke();
  // grain
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;
  for(let y2=bot+5;y2<bot+eh;y2+=7){ctx.beginPath();ctx.moveTo(cx-nearW/2+4,y2);ctx.lineTo(cx+nearW/2-4,y2);ctx.stroke();}
  // label
  ctx.fillStyle='rgba(212,160,23,.45)';
  ctx.font=`${Math.round(W*0.022)}px "Bebas Neue"`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('◆  ZONA DE LANZAMIENTO  ◆',cx,bot+eh/2);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}

function drawHoles(){
  // Draw far-first for correct occlusion
  const sorted=[...HOLES].sort((a,b)=>a.v-b.v);
  sorted.forEach(h=>{
    if(h.isFrog) return;
    const{x,y,sc}=b2s(h.u,h.v);
    const baseR=Math.round(W*0.052); const r=Math.round(baseR*sc);
    // wood rim
    ctx.fillStyle='#1a0a04';
    ctx.beginPath();ctx.arc(x,y+r*.28,r+4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3c1e08';
    ctx.beginPath();ctx.arc(x,y,r+3,0,Math.PI*2);ctx.fill();
    // depth
    const gd=ctx.createRadialGradient(x,y,0,x,y,r);
    gd.addColorStop(0,'#000');gd.addColorStop(.65,'#080808');gd.addColorStop(1,h.color+'30');
    ctx.fillStyle=gd;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    // rim
    ctx.strokeStyle=h.color;ctx.lineWidth=Math.max(1.5,2.5*sc);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
    // highlight
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(x,y-r*.18,r*.65,Math.PI*1.15,Math.PI*1.85);ctx.stroke();
    // label
    ctx.fillStyle=h.color;
    ctx.font=`bold ${Math.round(r*.7)}px "Bebas Neue"`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(h.label,x,y);
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
  });
}

function drawFrog(){
  const{x,y,sc}=b2s(FROG.u,FROG.v);
  const r=Math.round(W*0.092*sc);
  const eating=frogEat>0;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.beginPath();ctx.ellipse(x,y+r*.88,r*1.1,r*.27,0,0,Math.PI*2);ctx.fill();

  // Body
  const gb=ctx.createRadialGradient(x-r*.2,y-r*.1,0,x,y,r*1.3);
  gb.addColorStop(0,'#3cb043');gb.addColorStop(.5,'#228B22');gb.addColorStop(1,'#145214');
  ctx.fillStyle=gb;
  ctx.beginPath();ctx.ellipse(x,y+r*.08,r*1.12,r*.88,0,0,Math.PI*2);ctx.fill();

  // Belly highlight
  ctx.fillStyle='rgba(100,220,100,.09)';
  ctx.beginPath();ctx.ellipse(x,y+r*.18,r*.62,r*.5,0,0,Math.PI*2);ctx.fill();

  // Eyes
  [-0.52,0.52].forEach(ex=>{
    const ex2=x+r*ex, ey=y-r*.52;
    const ge=ctx.createRadialGradient(ex2-r*.05,ey-r*.08,0,ex2,ey,r*.37);
    ge.addColorStop(0,'#55c055');ge.addColorStop(1,'#1a6a1a');
    ctx.fillStyle=ge;ctx.beginPath();ctx.arc(ex2,ey,r*.37,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a00';ctx.beginPath();ctx.arc(ex2,ey,r*.19,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#d4a017';ctx.beginPath();ctx.arc(ex2,ey,r*.12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(ex2+r*.025,ey,r*.075,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.8)';ctx.beginPath();ctx.arc(ex2-r*.09,ey-r*.11,r*.065,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#1a5a1a';ctx.lineWidth=Math.max(1,1.5*sc);
    ctx.beginPath();ctx.arc(ex2,ey,r*.37,0,Math.PI*2);ctx.stroke();
  });

  // Nostrils
  ctx.fillStyle='#145214';
  [x-r*.17,x+r*.17].forEach(nx=>{ctx.beginPath();ctx.ellipse(nx,y-r*.1,r*.055,r*.038,0,0,Math.PI*2);ctx.fill();});

  // Mouth (open toward viewer)
  const mo=eating?.12:1;
  ctx.fillStyle='#7f1d1d';
  ctx.beginPath();ctx.ellipse(x,y+r*.32,r*.68,r*.38*mo,0,0,Math.PI*2);ctx.fill();

  if(!eating){
    // Tongue
    ctx.fillStyle='#ef4444';
    ctx.beginPath();ctx.arc(x,y+r*.52,r*.34,0,Math.PI);ctx.fill();
    [x-r*.14,x+r*.14].forEach(tx=>{ctx.beginPath();ctx.arc(tx,y+r*.6,r*.09,0,Math.PI*2);ctx.fill();});
  }
  // Teeth
  ctx.fillStyle='#fef8e8';
  [-0.3,0,0.3].forEach(ti=>{ctx.beginPath();ctx.roundRect(x+r*ti-r*.08,y+r*.14,r*.16,r*.14*mo,2);ctx.fill();});

  // Mouth darkness
  const gmd=ctx.createRadialGradient(x,y+r*.3,0,x,y+r*.3,r*.55);
  gmd.addColorStop(0,'rgba(0,0,0,.92)');gmd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gmd;
  ctx.beginPath();ctx.ellipse(x,y+r*.3,r*.55*mo,r*.35*mo,0,0,Math.PI*2);ctx.fill();

  // Crown
  const crY=y-r*.88;
  ctx.fillStyle='#d4a017';
  ctx.beginPath();
  ctx.moveTo(x-r*.48,crY);ctx.lineTo(x-r*.48,crY-r*.33);
  ctx.lineTo(x-r*.18,crY-r*.18);ctx.lineTo(x,crY-r*.46);
  ctx.lineTo(x+r*.18,crY-r*.18);ctx.lineTo(x+r*.48,crY-r*.33);
  ctx.lineTo(x+r*.48,crY);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#b88010';ctx.lineWidth=Math.max(1,1.5*sc);ctx.stroke();
  ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(x,crY-r*.42,r*.065,0,Math.PI*2);ctx.fill();
  [x-r*.32,x+r*.32].forEach(ex3=>{ctx.fillStyle='#60a5fa';ctx.beginPath();ctx.arc(ex3,crY-r*.2,r*.05,0,Math.PI*2);ctx.fill();});

  // Front legs
  [-1.05,1.05].forEach(sx=>{
    const lx=x+r*sx,ly=y+r*.45;
    const g3=ctx.createRadialGradient(lx,ly,0,lx,ly,r*.26);
    g3.addColorStop(0,'#3cb043');g3.addColorStop(1,'#1a6a1a');
    ctx.fillStyle=g3;ctx.beginPath();ctx.ellipse(lx,ly,r*.26,r*.17,sx>0?.4:-.4,0,Math.PI*2);ctx.fill();
    [-1,0,1].forEach(t=>{ctx.fillStyle='#228B22';ctx.beginPath();ctx.arc(lx+t*r*.09+(sx>0?r*.09:-r*.09),ly+r*.11,r*.065,0,Math.PI*2);ctx.fill();});
  });

  // Body outline
  ctx.strokeStyle='#145214';ctx.lineWidth=Math.max(1.5,2*sc);
  ctx.beginPath();ctx.ellipse(x,y+r*.08,r*1.12,r*.88,0,0,Math.PI*2);ctx.stroke();

  // Draw mouth hole indicator (the actual scoring zone)
  const ms=b2s(MOUTH_U,MOUTH_V);
  const moleR=Math.round(W*0.038*ms.sc);
  const gmh=ctx.createRadialGradient(ms.x,ms.y,0,ms.x,ms.y,moleR);
  gmh.addColorStop(0,'rgba(0,0,0,.9)');gmh.addColorStop(.5,'rgba(0,0,0,.6)');gmh.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gmh;
  ctx.beginPath();ctx.arc(ms.x,ms.y,moleR,0,Math.PI*2);ctx.fill();

  // Label
  ctx.fillStyle='rgba(74,222,128,.9)';
  ctx.font=`bold ${Math.round(W*0.036*sc)}px "Bebas Neue"`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('1000 pts',x,y-r*1.28);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  if(frogEat>0) frogEat--;
}

function drawRing(){
  if(!ring.active && gameState!=='round') return;
  if(!ring.active && gameState==='round'){
    // draw ring at launch position
    const s=b2s(0.5,0.06);
    _drawRingAt(s.x,s.y,s.sc);
    return;
  }
  const s=b2s(ring.u,ring.v);
  // Trail
  trail.forEach((t,i)=>{
    const ts=b2s(t.u,t.v);
    const a=(i/trail.length)*.4;
    const tr=Math.round(W*0.036*ts.sc)*(i/trail.length)*.55;
    ctx.fillStyle=`rgba(212,160,23,${a})`;
    ctx.beginPath();ctx.arc(ts.x,ts.y,Math.max(1,tr),0,Math.PI*2);ctx.fill();
  });
  _drawRingAt(s.x,s.y,s.sc);
}

function _drawRingAt(x,y,sc){
  const R=Math.round(W*0.036*sc);
  const r2=Math.round(R*.5);
  const tilt=0.68; // ellipse y-ratio for perspective

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath();ctx.ellipse(x+2,y+R*.85,R*1.05,R*tilt*.28,0,0,Math.PI*2);ctx.fill();

  // Outer ring
  const gr=ctx.createRadialGradient(x-R*.25,y-R*.1*tilt,0,x,y,R*1.15);
  gr.addColorStop(0,'#f0e060');gr.addColorStop(.35,'#d4a017');
  gr.addColorStop(.72,'#7a5010');gr.addColorStop(1,'#3a2008');
  ctx.fillStyle=gr;
  ctx.beginPath();ctx.ellipse(x,y,R,R*tilt,0,0,Math.PI*2);ctx.fill();

  // Inner hole (shows felt behind)
  ctx.fillStyle='#0e3a0e';
  ctx.beginPath();ctx.ellipse(x,y,r2,r2*tilt,0,0,Math.PI*2);ctx.fill();

  // Top highlight
  ctx.strokeStyle='rgba(255,255,255,.32)';ctx.lineWidth=Math.max(1.5,2.5*sc);
  ctx.beginPath();ctx.ellipse(x,y,R*.7,R*.7*tilt,0,Math.PI*1.1,Math.PI*1.9);ctx.stroke();

  // Shine spot
  ctx.fillStyle='rgba(255,255,255,.22)';
  ctx.beginPath();ctx.ellipse(x-R*.33,y-R*.2*tilt,R*.2,R*.1*tilt,-.3,0,Math.PI*2);ctx.fill();
}

function drawFloaters(){
  floaters=floaters.filter(f=>f.life>0);
  floaters.forEach(f=>{
    const a=f.life/70;
    ctx.save();ctx.globalAlpha=a;ctx.fillStyle=f.color;
    ctx.font=`bold ${Math.round(W*0.07*f.sc)}px "Abril Fatface"`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor=f.color;ctx.shadowBlur=12*a;
    ctx.fillText(f.txt,f.x,f.y);ctx.restore();
    f.y-=1.3;f.life--;f.sc=Math.min(1,f.sc+0.04);
  });
}

/* ─── PHYSICS LOOP ─────────────────────────────────────── */
function physicsLoop(ts){
  const dt=Math.min((ts-lastT)/1000,0.033);lastT=ts;

  if(ring.active){
    trail.push({u:ring.u,v:ring.v});
    if(trail.length>16) trail.shift();

    ring.u+=ring.vu*dt;
    ring.v+=ring.vv*dt;
    ring.spin+=ring.vv*dt*3;

    ring.vu*=Math.max(0,1-FRICTION_U*dt);
    ring.vv*=Math.max(0,1-FRICTION_V*dt);

    // Wind turbulence — random gusts that push the ring sideways and slow it
    const windU=(Math.random()-0.5)*2.8*dt;
    const windV=(Math.random()-0.5)*1.2*dt;
    ring.vu+=windU;
    ring.vv+=windV;

    // Occasional stronger gust burst (10% chance per frame)
    if(Math.random()<0.10){
      ring.vu+=(Math.random()-0.5)*1.4;
      ring.vv-=Math.random()*0.3; // sometimes slows forward progress
    }

    // Side bounce
    if(ring.u<0.04){ring.u=0.04;ring.vu=Math.abs(ring.vu)*.5;}
    if(ring.u>0.96){ring.u=0.96;ring.vu=-Math.abs(ring.vu)*.5;}

    // Collision checks
    let hit=false;
    for(const h of HOLES){
      const hr=h.r||(h.isFrog?MOUTH_R:0.054);
      const du=ring.u-h.u, dv=ring.v-h.v;
      if(Math.sqrt(du*du+dv*dv)<hr){
        if(h.isFrog){
          // Frog mouth: ring must be moving FORWARD and be at mouth depth
          if(ring.vv>0.03 && Math.abs(ring.v - MOUTH_V)<0.05){
            onHit(h);hit=true;break;
          }
        } else {
          onHit(h);hit=true;break;
        }
      }
    }
    if(hit){raf=null;return;}

    const spd=Math.sqrt(ring.vu*ring.vu+ring.vv*ring.vv);
    // Miss: past board, or stopped mid-board
    if(ring.v>0.97||(spd<0.012&&ring.v>0.1)){onMiss();raf=null;return;}
  }

  drawAll();
  raf=requestAnimationFrame(physicsLoop);
}

function onHit(h){
  ring.active=false;trail=[];
  roundPts+=h.pts;
  document.getElementById('sbPts').textContent=roundPts;
  const sp=b2s(h.u,h.v);
  floaters.push({x:sp.x,y:sp.y-24,txt:'+'+h.pts,color:h.isFrog?'#4ade80':'#f0c040',life:70,sc:.4});
  if(h.isFrog){
    frogEat=28;
    setTimeout(()=>floaters.push({x:W/2,y:H*.35,txt:'¡RANA!',color:'#4ade80',life:90,sc:.28}),180);
  }
  litPaytable(roundPts);
  proceed();
}
function onMiss(){
  ring.active=false;trail=[];
  const sp=b2s(ring.u,Math.min(ring.v,.95));
  floaters.push({x:Math.max(60,Math.min(W-60,sp.x)),y:sp.y,txt:'FALLO',color:'#f87171',life:50,sc:.4});
  proceed();
}
function proceed(){
  throwsDone++;
  const d=document.getElementById('dot'+(throwsDone-1));
  if(d) d.classList.add('used');
  drawAll();
  if(throwsDone>=MAX_THROWS){setTimeout(endRound,700);return;}
  gameState='round';
  ring={u:.5,v:.06,vu:0,vv:0,active:false,spin:0};
  document.getElementById('instruct').innerHTML=`<b>Arrastra hacia arriba</b> para lanzar · Aro ${throwsDone+1} de ${MAX_THROWS}`;
  raf=requestAnimationFrame(physicsLoop);
}

/* ─── DRAG/LAUNCH INPUT ────────────────────────────────── */
let dragStart=null,dragNow=null,isDrag=false;
const lb=document.getElementById('launchBtn');

// ── CANVAS drag (arrastrar para lanzar) ──────────────────
cv.addEventListener('mousedown', e=>{
  if(gameState!=='round') return;
  isDrag=true; dragStart={x:e.clientX,y:e.clientY}; dragNow={x:e.clientX,y:e.clientY};
});
cv.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(gameState!=='round') return;
  isDrag=true;
  dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
  dragNow={...dragStart};
},{passive:false});
cv.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(isDrag) dragNow={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:false});
cv.addEventListener('touchend', e=>{
  e.preventDefault();
  if(isDrag && gameState==='round'){isDrag=false;doLaunch();}
  isDrag=false;
},{passive:false});

// ── BUTTON: toca → startRound ó arrastra → lanza ─────────
lb.addEventListener('touchstart', e=>{
  e.preventDefault(); // necesario para evitar scroll
  if(gameState==='idle'||gameState==='done'){
    startRound(); return; // botón funciona como click
  }
  // en estado round: funciona como punto de arrastre
  isDrag=true;
  dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
  dragNow={...dragStart};
},{passive:false});
lb.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(isDrag) dragNow={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:false});
lb.addEventListener('touchend', e=>{
  e.preventDefault();
  if(isDrag && gameState==='round'){isDrag=false;doLaunch();}
  isDrag=false;
},{passive:false});

// ── Mouse en botón (desktop) ──────────────────────────────
lb.addEventListener('click', ()=>{
  if(gameState==='idle'||gameState==='done') startRound();
});
lb.addEventListener('mousedown', e=>{
  if(gameState!=='round') return;
  isDrag=true; dragStart={x:e.clientX,y:e.clientY}; dragNow={x:e.clientX,y:e.clientY};
});

// ── Documento: captura move/up aunque salga del elemento ──
document.addEventListener('mousemove', e=>{if(isDrag) dragNow={x:e.clientX,y:e.clientY};});
document.addEventListener('mouseup', ()=>{
  if(isDrag && gameState==='round') doLaunch();
  isDrag=false; dragStart=null; dragNow=null;
});

function doLaunch(){
  if(!dragStart||!dragNow){dragStart=null;dragNow=null;return;}
  const dx=dragNow.x-dragStart.x;
  const dy=dragNow.y-dragStart.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<6){dragStart=null;dragNow=null;return;}

  const normDy=-dy/dist; // negativo = arriba = hacia adelante
  const normDx= dx/dist;
  if(normDy<0.08){toast('¡Arrastra hacia ARRIBA!','err');dragStart=null;dragNow=null;return;}

  const power=Math.min(dist/100,1);
  ring.vv=normDy*2.4*power+0.25;
  ring.vu=normDx*1.8*power;
  ring.u=.5;ring.v=.06;ring.active=true;ring.spin=0;
  trail=[];dragStart=null;dragNow=null;
  gameState='flying';
  if(raf) cancelAnimationFrame(raf);
  lastT=performance.now();
  raf=requestAnimationFrame(physicsLoop);
  lb.classList.add('pressed');setTimeout(()=>lb.classList.remove('pressed'),200);
}

/* ─── ROUND MANAGEMENT ──────────────────────────────────── */
function startRound(){
  if(bet>coins){toast('Fichas insuficientes','err');return;}
  coins=Coins.sub(bet);animCoins(coins+bet,coins);
  roundPts=0;throwsDone=0;
  // Reset drag state to prevent stale isDrag=true from button click
  isDrag=false;dragStart=null;dragNow=null;
  document.getElementById('sbPts').textContent='0';
  document.getElementById('sbMult').textContent='—';
  document.querySelectorAll('.tdot').forEach(d=>d.classList.remove('used'));
  document.querySelectorAll('.pt-row').forEach(r=>r.classList.remove('lit'));
  floaters=[];trail=[];ring={u:.5,v:.06,vu:0,vv:0,active:false,spin:0};frogEat=0;
  document.querySelectorAll('.chip').forEach(c=>c.disabled=true);
  document.getElementById('lbtnIcon').textContent='🎯';
  document.getElementById('lbtnLabel').textContent='LANZAR';
  gameState='round';
  document.getElementById('instruct').innerHTML=`<b>Arrastra hacia arriba</b> en el tablero · Aro 1 de ${MAX_THROWS}`;
  if(raf) cancelAnimationFrame(raf);
  lastT=performance.now();
  raf=requestAnimationFrame(physicsLoop);
}

function endRound(){
  gameState='done';
  const pay=litPaytable(roundPts);
  stats.r++;
  if(pay.mult>0){
    const won=Math.floor(bet*pay.mult),net=won-bet;
    coins=Coins.add(won);animCoins(coins-won,coins);
    stats.w++;stats.net+=net;
    history.unshift({won:true,pts:roundPts,rana:roundPts>=1000});
    document.getElementById('instruct').innerHTML=`🏆 <b>+${Coins.fmt(won)} fichas</b> (×${pay.mult}) · ${roundPts} puntos`;
    if(roundPts>=400) confetti(roundPts>=1000?80:45);
  } else {
    stats.l++;stats.net-=bet;
    history.unshift({won:false,pts:roundPts,rana:false});
    document.getElementById('instruct').innerHTML=`😔 Sin premio · ${roundPts} puntos`;
  }
  updateStats();renderHistory();
  roundNum++;document.getElementById('sbRound').textContent=roundNum;
  document.querySelectorAll('.chip').forEach(c=>c.disabled=false);
  document.getElementById('lbtnIcon').textContent='🐸';
  document.getElementById('lbtnLabel').textContent='NUEVA RONDA';
}

/* ─── CHIP SELECTION ────────────────────────────────────── */
function selChip(v,el){
  bet=v;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');document.getElementById('betEl').textContent=Coins.fmt(bet);
}

/* ─── STATS ──────────────────────────────────────────────── */
function updateStats(){
  document.getElementById('stR').textContent=stats.r;
  document.getElementById('stW').textContent=stats.w;
  document.getElementById('stL').textContent=stats.l;
  const n=document.getElementById('stNet');
  n.textContent=(stats.net>=0?'+':'')+Coins.fmt(stats.net);
  n.className='sv '+(stats.net>0?'pos':stats.net<0?'neg':'');
}
function renderHistory(){
  if(history.length>20) history.length=20;
  document.getElementById('histEl').innerHTML=history.map(h=>{
    const cls=h.rana?'hjk':h.won?'hw':'hl2';
    return`<div class="hd ${cls}">${h.pts}pts</div>`;
  }).join('');
}

/* ─── EFFECTS ────────────────────────────────────────────── */
function confetti(n=40){
  const cols=['#d4a017','#f0c040','#4ade80','#fff','#f87171','#60a5fa'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');c.className='cf';
    c.style.cssText=`left:${5+Math.random()*90}vw;top:-10px;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${cols[i%cols.length]};--dur:${1.5+Math.random()*.9}s;animation-delay:${Math.random()*.5}s;`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),3000);
  }
}
function toast(msg,type=''){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='toast '+(type||'');el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2400);
}

/* ─── COINS ANIM ─────────────────────────────────────────── */
function animCoins(from,to){
  const dur=500,t0=performance.now();
  function step(now){
    const t=Math.min((now-t0)/dur,1),e=1-Math.pow(1-t,3);
    const v=Math.round(from+(to-from)*e);
    document.getElementById('coinsEl').textContent=Coins.fmt(v);
    document.getElementById('balEl').textContent=Coins.fmt(v);
    if(t<1) requestAnimationFrame(step);
    else{document.getElementById('coinsEl').textContent=Coins.fmt(to);document.getElementById('balEl').textContent=Coins.fmt(to);}
  }
  requestAnimationFrame(step);
}

/* ─── CURSOR ─────────────────────────────────────────────── */
const curEl=document.getElementById('cur'),curDot=document.getElementById('curDot');
let mx=0,my=0,ccx=0,ccy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curDot.style.left=mx+'px';curDot.style.top=my+'px';});
(function loop(){ccx+=(mx-ccx)*.14;ccy+=(my-ccy)*.14;curEl.style.left=ccx+'px';curEl.style.top=ccy+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('button,a,.chip').forEach(el=>{el.addEventListener('mouseenter',()=>curEl.classList.add('h'));el.addEventListener('mouseleave',()=>curEl.classList.remove('h'));});

/* ─── INIT ───────────────────────────────────────────────── */
coins=Coins.get();
document.getElementById('coinsEl').textContent=Coins.fmt(coins);
document.getElementById('balEl').textContent=Coins.fmt(coins);
document.getElementById('betEl').textContent=Coins.fmt(bet);
resize();
</script>
</body>
