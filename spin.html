<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ruleta de la Suerte — Casino Royale</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Bebas+Neue&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08050f;
  --purple:#1a0a2e;--purple2:#240d40;--purple3:#2e1050;
  --gold:#d4a017;--gold2:#f0c040;--gold3:#a07010;--gold4:#fce07a;--gold5:#ffe9a0;
  --magenta:#c020a0;--magenta2:#e030c0;
  --cyan:#10c0d0;--cyan2:#30e0f0;
  --red:#e02030;--green2:#20c060;--green3:#40e080;
  --cream:#fef4ff;--txt2:rgba(254,244,255,.38);
  --border:rgba(212,160,23,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);}
body{font-family:'Cinzel',serif;color:var(--cream);cursor:none;overflow-x:hidden;}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 50% 20%,rgba(60,10,120,.35) 0%,transparent 65%),
    radial-gradient(ellipse at 20% 80%,rgba(192,32,160,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 70%,rgba(16,192,208,.06) 0%,transparent 50%);
}

/* Stars bg */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,.6),transparent),
    radial-gradient(1px 1px at 35% 8%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 65% 15%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 82% 5%,rgba(255,255,255,.3),transparent),
    radial-gradient(1.5px 1.5px at 50% 3%,rgba(252,224,122,.8),transparent),
    radial-gradient(1px 1px at 90% 25%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 8% 45%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 95% 60%,rgba(255,255,255,.3),transparent);
}

/* ── CURSOR ── */
#cur{width:18px;height:18px;border:1.5px solid var(--gold2);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .07s;box-shadow:0 0 10px rgba(240,192,64,.5);}
#curDot{width:3px;height:3px;background:var(--gold4);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cur.h{transform:translate(-50%,-50%) scale(2.2);background:rgba(212,160,23,.07);}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(8,5,15,.98);border-bottom:1px solid var(--border);}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);opacity:.4;}
.back{font-family:'Cinzel';font-size:.65rem;letter-spacing:3px;color:var(--txt2);text-decoration:none;cursor:none;transition:color .2s;}
.back:hover{color:var(--gold2);}
.top-title{font-family:'Cinzel Decorative';font-size:.85rem;color:var(--gold2);text-shadow:0 0 18px rgba(240,192,64,.4);}
.top-coins{display:flex;align-items:center;gap:5px;background:rgba(212,160,23,.07);border:1px solid var(--border);padding:4px 11px;font-family:'DM Mono';font-size:.78rem;color:var(--gold2);}

/* ── PAGE ── */
.page{max-width:490px;margin:0 auto;padding:8px 8px 32px;display:flex;flex-direction:column;gap:10px;position:relative;z-index:1;}

/* ── COUNTDOWN / STATUS ── */
.cd-banner{
  text-align:center;padding:10px 16px 8px;
  background:linear-gradient(180deg,rgba(26,10,46,.9),rgba(36,13,64,.9));
  border:1px solid var(--border);position:relative;overflow:hidden;
}
.cd-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);}
.cd-title{font-family:'Cinzel Decorative';font-size:.6rem;letter-spacing:4px;color:var(--txt2);display:block;margin-bottom:4px;}
.cd-time{font-family:'DM Mono';font-size:1.5rem;color:var(--gold2);text-shadow:0 0 18px rgba(240,192,64,.4);letter-spacing:4px;}
.cd-sub{font-size:.58rem;letter-spacing:3px;color:var(--txt2);display:block;margin-top:3px;}
.cd-ready{font-family:'Cinzel Decorative';font-size:.85rem;color:var(--gold4);text-shadow:0 0 16px rgba(252,224,122,.5);animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── WHEEL WRAPPER ── */
.wheel-section{
  position:relative;display:flex;flex-direction:column;align-items:center;
  padding:20px 0 16px;
  background:linear-gradient(180deg,rgba(26,10,46,.8),rgba(8,5,15,.8));
  border:2px solid var(--gold3);
  overflow:hidden;
}
.wheel-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(60,10,120,.18),transparent 70%);pointer-events:none;}

/* Decorative top arc */
.deco-arc{
  font-family:'Cinzel Decorative';font-size:.5rem;letter-spacing:8px;
  color:rgba(212,160,23,.35);margin-bottom:12px;text-align:center;
}

/* Outer ring lights */
.ring-lights{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  width:min(360px,94vw);height:min(360px,94vw);
  pointer-events:none;z-index:0;
}

/* ── WHEEL CANVAS ── */
#wheelWrap{position:relative;width:min(320px,86vw);height:min(320px,86vw);margin:0 auto;}
#wheelCv{display:block;width:100%;height:100%;}

/* Pointer/arrow */
.pointer{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:0;height:0;z-index:10;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-top:36px solid var(--gold2);
  filter:drop-shadow(0 2px 8px rgba(240,192,64,.8));
}
.pointer::after{
  content:'';position:absolute;top:-40px;left:-6px;
  width:12px;height:12px;border-radius:50%;
  background:var(--gold4);
  box-shadow:0 0 14px rgba(252,224,122,.9);
}

/* Center hub */
.hub{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:52px;height:52px;border-radius:50%;z-index:10;
  background:radial-gradient(circle at 35% 35%,var(--gold4),var(--gold),var(--gold3));
  border:3px solid var(--gold5);
  box-shadow:0 0 22px rgba(240,192,64,.6),0 0 40px rgba(240,192,64,.25),inset 0 1px 0 rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel Decorative';font-size:.55rem;color:#3a2008;font-weight:700;
  cursor:none;
}

/* ── SPIN BUTTON ── */
.spin-btn-wrap{margin-top:16px;width:100%;display:flex;justify-content:center;}
.spin-btn{
  padding:0;width:72%;height:62px;cursor:none;
  background:linear-gradient(180deg,#1a0828,#0e0418);
  border:1px solid var(--gold3);position:relative;overflow:hidden;
  transition:all .12s;
}
.spin-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(180,80,255,.12),transparent);pointer-events:none;}
.spin-btn:active,.spin-btn.pressed{transform:scale(.97);}
.spin-btn:disabled{opacity:.35;pointer-events:none;}
.sbi{
  width:75%;height:68%;margin:auto;position:relative;
  background:radial-gradient(ellipse at 40% 35%,#8010c0,#400a60);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;
  border:1px solid rgba(180,80,255,.3);
  box-shadow:inset 0 1px 4px rgba(200,100,255,.2);
}
.sbi-icon{font-size:1.2rem;}
.sbi-txt{font-family:'Cinzel Decorative';font-size:.62rem;letter-spacing:2px;color:var(--gold2);}

/* Rivet deco */
.spin-btn::after{content:'◉  ◉';position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;text-align:justify;padding:0 8px;font-size:9px;color:var(--gold3);pointer-events:none;}

/* ── RESULT DISPLAY ── */
.result-panel{
  padding:12px 16px;text-align:center;
  background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.05);
  position:relative;overflow:hidden;min-height:68px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
}
.result-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);}
.res-idle{font-family:'Cinzel';font-size:.65rem;letter-spacing:3px;color:var(--txt2);}
.res-prize{font-family:'Cinzel Decorative';font-size:1.4rem;line-height:1.1;animation:prizeIn .4s cubic-bezier(.18,1.5,.38,1) both;}
@keyframes prizeIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.res-sub{font-family:'DM Mono';font-size:.7rem;color:var(--txt2);letter-spacing:1px;}

/* ── PRIZES TABLE ── */
.prizes-section{background:rgba(8,5,15,.9);border:1px solid var(--border);}
.pt-head{
  padding:8px 12px 6px;text-align:center;
  font-family:'Cinzel';font-size:.52rem;letter-spacing:5px;color:var(--txt2);
  border-bottom:1px solid rgba(255,255,255,.04);
}
.prizes-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:6px;}
.pz-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 9px;background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.03);transition:.2s;
}
.pz-row.lit{background:rgba(212,160,23,.1);border-color:rgba(212,160,23,.3);box-shadow:0 0 8px rgba(212,160,23,.1);}
.pz-row.jackpot-row.lit{background:rgba(240,192,64,.08);border-color:var(--gold2);box-shadow:0 0 14px rgba(240,192,64,.2);}
.pz-color{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.pz-name{font-family:'Cinzel';font-size:.55rem;flex:1;color:var(--txt2);}
.pz-val{font-family:'Cinzel Decorative';font-size:.72rem;color:var(--gold2);}
.jackpot-row .pz-val{color:var(--gold4);text-shadow:0 0 10px rgba(252,224,122,.4);}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.sbox{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.05);padding:7px 4px;text-align:center;}
.sv{font-family:'DM Mono';font-size:.82rem;display:block;color:var(--gold);}
.sl{font-family:'Cinzel';font-size:.4rem;letter-spacing:3px;color:rgba(255,255,255,.2);display:block;margin-top:1px;}
.sv.pos{color:var(--green3);}

/* ── HISTORY ── */
.hist-wrap{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.04);padding:8px 10px;}
.hl{font-family:'Cinzel';font-size:.44rem;letter-spacing:4px;color:rgba(255,255,255,.18);display:block;margin-bottom:7px;}
.hdots{display:flex;gap:4px;flex-wrap:wrap;}
.hd{padding:2px 8px;border-radius:2px;font-family:'DM Mono';font-size:.62rem;animation:hdIn .2s ease both;}
@keyframes hdIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}

.toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:rgba(8,5,15,.97);border:1px solid var(--gold2);color:var(--gold2);font-family:'Cinzel';font-size:.72rem;letter-spacing:3px;padding:6px 16px;z-index:700;white-space:nowrap;pointer-events:none;animation:tIn .2s ease both;}
@keyframes tIn{from{opacity:0;transform:translateX(-50%)translateY(-6px)}to{opacity:1;transform:translateX(-50%)translateY(0)}}
.toast.err{border-color:#f87171;color:#f87171;}
.cf{position:fixed;pointer-events:none;z-index:600;border-radius:2px;animation:cfA var(--dur,2s) ease forwards;}
@keyframes cfA{0%{opacity:1;transform:translateY(0)rotate(0)}100%{opacity:0;transform:translateY(120vh)rotate(720deg)}}

/* BULB LIGHTS */
.bulbs{position:absolute;inset:0;pointer-events:none;z-index:2;}
.bulb{
  position:absolute;width:8px;height:8px;border-radius:50%;
  background:var(--gold2);
  box-shadow:0 0 6px 2px var(--gold2);
  animation:bulbFlash 1.2s ease infinite;
}
@keyframes bulbFlash{0%,100%{opacity:.9;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
</style>
</head>
<body>
<div id="cur"></div><div id="curDot"></div>

<div class="topbar">
  <a href="index.html" class="back">← CASINO</a>
  <span class="top-title">🌀 Ruleta de la Suerte</span>
  <div class="top-coins">🪙 <span id="coinsEl">—</span></div>
</div>

<div class="page">

  <!-- COUNTDOWN -->
  <div class="cd-banner" id="cdBanner">
    <span class="cd-title">◆ PRÓXIMA TIRADA GRATIS ◆</span>
    <div id="cdTime" class="cd-time">—</div>
    <span class="cd-sub" id="cdSub">cargando…</span>
  </div>

  <!-- WHEEL -->
  <div class="wheel-section">
    <div class="deco-arc">✦ &nbsp; FORTUNE &nbsp; WHEEL &nbsp; ✦</div>

    <div id="wheelWrap">
      <div class="pointer"></div>
      <canvas id="wheelCv"></canvas>
      <div class="hub" id="hubEl">✦</div>
      <!-- Bulb lights injected by JS -->
    </div>

    <div class="spin-btn-wrap">
      <button class="spin-btn" id="spinBtn" onclick="doSpin()">
        <div class="sbi">
          <span class="sbi-icon">🌀</span>
          <span class="sbi-txt" id="spinTxt">GIRAR</span>
        </div>
      </button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result-panel" id="resultPanel">
    <span class="res-idle">Gira la ruleta para ganar fichas gratis</span>
  </div>

  <!-- PRIZES TABLE -->
  <div class="prizes-section">
    <div class="pt-head">◆ PREMIOS DISPONIBLES ◆</div>
    <div class="prizes-grid" id="prizesGrid"></div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="sbox"><span class="sv" id="stSpins">0</span><span class="sl">GIROS</span></div>
    <div class="sbox"><span class="sv pos" id="stTotal">0</span><span class="sl">FICHAS GANADAS</span></div>
    <div class="sbox"><span class="sv" id="stBest">—</span><span class="sl">MEJOR PREMIO</span></div>
  </div>

  <!-- HISTORY -->
  <div class="hist-wrap">
    <span class="hl">◆ HISTORIAL DE GIROS</span>
    <div class="hdots" id="histEl"></div>
  </div>

</div>

<script>
/* ── COINS ─────────────────────────────────────────────── */
const CKEY='casino_royale_coins';
const Coins={
  get(){const v=parseInt(localStorage.getItem(CKEY));return isNaN(v)?10000:v;},
  set(n){const v=Math.max(0,Math.round(n));localStorage.setItem(CKEY,v);return v;},
  add(n){return this.set(this.get()+n);},
  fmt(n){return(n??this.get()).toLocaleString('de-DE');}
};

const SPIN_KEY='casino_royale_last_spin';

/* ── WHEEL SEGMENTS ─────────────────────────────────────── */
const SEGMENTS=[
  {label:'50',    coins:50,    color:'#1a3a8a', glow:'#3060dd', weight:18},
  {label:'100',   coins:100,   color:'#2a1a6a', glow:'#6040cc', weight:14},
  {label:'200',   coins:200,   color:'#4a0a30', glow:'#cc2080', weight:12},
  {label:'500',   coins:500,   color:'#1a4a1a', glow:'#30cc60', weight:8},
  {label:'250',   coins:250,   color:'#3a2a00', glow:'#c0880a', weight:10},
  {label:'75',    coins:75,    color:'#0a2a4a', glow:'#1090cc', weight:16},
  {label:'1.000', coins:1000,  color:'#4a1a00', glow:'#e04010', weight:6},
  {label:'150',   coins:150,   color:'#2a0a4a', glow:'#9020cc', weight:12},
  {label:'300',   coins:300,   color:'#002a2a', glow:'#10aaaa', weight:9},
  {label:'750',   coins:750,   color:'#2a0a18', glow:'#cc1050', weight:5},
  {label:'100',   coins:100,   color:'#1a1a3a', glow:'#4040bb', weight:14},
  {label:'2.000', coins:2000,  color:'#1a1000', glow:'var(--gold2)', weight:3},
  {label:'125',   coins:125,   color:'#0a3a1a', glow:'#20aa50', weight:13},
  {label:'400',   coins:400,   color:'#3a0a40', glow:'#aa20cc', weight:7},
  {label:'50',    coins:50,    color:'#001a3a', glow:'#1060aa', weight:16},
  {label:'5.000', coins:5000,  color:'#1a0a00', glow:'#f0c040', weight:1},
];

/* Build weighted deck for randomness */
function pickSegment(){
  const total=SEGMENTS.reduce((s,seg)=>s+seg.weight,0);
  let r=Math.random()*total;
  for(let i=0;i<SEGMENTS.length;i++){r-=SEGMENTS[i].weight;if(r<=0)return i;}
  return 0;
}

/* ── CANVAS WHEEL ───────────────────────────────────────── */
const cv=document.getElementById('wheelCv');
const ctx=cv.getContext('2d');
const wWrap=document.getElementById('wheelWrap');
const N=SEGMENTS.length;
const ARC=2*Math.PI/N;

let W=0, CX=0, CY=0, R=0;
let currentAngle=0;
let spinning=false;
let stats={spins:0,total:0,best:0};
let history=[];

function resizeWheel(){
  W=wWrap.clientWidth;
  cv.width=W; cv.height=W;
  CX=W/2; CY=W/2; R=W*0.468;
  buildBulbs();
  drawWheel(currentAngle);
}
window.addEventListener('resize',resizeWheel);

/* ── DRAW WHEEL ─────────────────────────────────────────── */
function drawWheel(angle){
  ctx.clearRect(0,0,W,W);

  // Outer decorative ring
  ctx.save();
  const gOuter=ctx.createRadialGradient(CX,CY,R*0.88,CX,CY,R*1.02);
  gOuter.addColorStop(0,'#3a2a08');gOuter.addColorStop(.5,'#c89020');gOuter.addColorStop(1,'#7a5010');
  ctx.fillStyle=gOuter;ctx.beginPath();ctx.arc(CX,CY,R*1.03,0,Math.PI*2);ctx.fill();

  // Gold tick marks on rim
  for(let i=0;i<N*2;i++){
    const a=angle+i*(Math.PI/N);
    ctx.save();ctx.translate(CX,CY);ctx.rotate(a);
    ctx.fillStyle=i%2===0?'rgba(252,224,122,.7)':'rgba(212,160,23,.3)';
    ctx.fillRect(-1,-(R*1.0)-(i%2===0?5:3),2,i%2===0?5:3);
    ctx.restore();
  }

  // Segments
  SEGMENTS.forEach((seg,i)=>{
    const startA=angle+i*ARC;
    const endA=startA+ARC;
    const midA=startA+ARC/2;

    // Fill
    ctx.save();
    const gSeg=ctx.createRadialGradient(CX,CY,0,CX,CY,R);
    gSeg.addColorStop(0,lightenColor(seg.color,0.4));
    gSeg.addColorStop(0.5,seg.color);
    gSeg.addColorStop(1,darkenColor(seg.color,0.4));
    ctx.fillStyle=gSeg;
    ctx.beginPath();
    ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,startA,endA);ctx.closePath();
    ctx.fill();

    // Separator line
    ctx.strokeStyle='rgba(0,0,0,.55)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(CX,CY);
    ctx.lineTo(CX+Math.cos(startA)*R,CY+Math.sin(startA)*R);
    ctx.stroke();

    // Glow arc near rim
    ctx.strokeStyle=seg.glow.startsWith('var')?'#f0c040':seg.glow;
    ctx.lineWidth=Math.max(2,R*0.025);ctx.globalAlpha=0.45;
    ctx.beginPath();ctx.arc(CX,CY,R*0.88,startA+0.03,endA-0.03);ctx.stroke();
    ctx.globalAlpha=1;

    // Label
    ctx.save();
    ctx.translate(CX+Math.cos(midA)*R*0.68,CY+Math.sin(midA)*R*0.68);
    ctx.rotate(midA+Math.PI/2);
    const fs=seg.coins>=1000?Math.max(9,R*0.065):Math.max(10,R*0.075);
    ctx.font=`700 ${fs}px "Cinzel Decorative"`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    // Shadow
    ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillText(seg.label,1,1);
    // Main text
    const lc=seg.coins>=2000?'#fce07a':seg.coins>=500?'#f0d060':'rgba(255,255,255,.92)';
    ctx.fillStyle=lc;ctx.fillText(seg.label,0,0);
    ctx.restore();

    ctx.restore();
  });

  // Inner ring shadow
  const gInner=ctx.createRadialGradient(CX,CY,R*0.18,CX,CY,R*0.32);
  gInner.addColorStop(0,'rgba(0,0,0,.6)');gInner.addColorStop(1,'transparent');
  ctx.fillStyle=gInner;ctx.beginPath();ctx.arc(CX,CY,R*0.32,0,Math.PI*2);ctx.fill();
}

function lightenColor(hex,amt){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${Math.min(255,r+Math.round(120*amt))},${Math.min(255,g+Math.round(120*amt))},${Math.min(255,b+Math.round(120*amt))})`;
}
function darkenColor(hex,amt){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${Math.max(0,r-Math.round(80*amt))},${Math.max(0,g-Math.round(80*amt))},${Math.max(0,b-Math.round(80*amt))})`;
}

/* ── BULB LIGHTS ─────────────────────────────────────────── */
function buildBulbs(){
  const old=wWrap.querySelector('.bulbs');if(old) old.remove();
  const container=document.createElement('div');container.className='bulbs';
  const count=24;
  for(let i=0;i<count;i++){
    const a=(i/count)*Math.PI*2-Math.PI/2;
    const r=W*0.5;
    const x=50+Math.cos(a)*49; // %
    const y=50+Math.sin(a)*49;
    const b=document.createElement('div');
    b.className='bulb';
    b.style.left=x+'%';b.style.top=y+'%';
    b.style.animationDelay=(i*0.05)+'s';
    b.style.animationDuration=(0.9+Math.random()*0.6)+'s';
    container.appendChild(b);
  }
  wWrap.appendChild(container);
}

/* ── SPIN ANIMATION ─────────────────────────────────────── */
function doSpin(){
  if(spinning) return;

  // Check cooldown
  const last=parseInt(localStorage.getItem(SPIN_KEY)||'0');
  const now=Date.now();
  const elapsed=now-last;
  const DAY=24*60*60*1000;
  if(elapsed<DAY){
    const rem=DAY-elapsed;
    toast('Vuelve en '+fmtCountdown(rem),'err');
    return;
  }

  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinTxt').textContent='GIRANDO…';

  // Pick winning segment
  const winIdx=pickSegment();
  // Calculate target angle so winIdx ends under pointer (top = -PI/2)
  // Pointer is at top → angle=0 on canvas = right side → pointer at -PI/2
  // Segment i occupies [currentAngle + i*ARC, currentAngle + (i+1)*ARC]
  // We want midpoint of winning segment to land at top (-PI/2)
  const extraSpins=5+Math.floor(Math.random()*4); // 5-8 full rotations
  const targetMid=(-Math.PI/2)-(winIdx*ARC+ARC/2);
  // Normalize
  const targetAngle=currentAngle+extraSpins*Math.PI*2+(targetMid-currentAngle%(Math.PI*2)+Math.PI*3)%(Math.PI*2)-Math.PI;

  const duration=5000+Math.random()*1500;
  const startAngle=currentAngle;
  const t0=performance.now();

  // Ease out quintic
  function easeOut(t){return 1-Math.pow(1-t,5);}

  function frame(now){
    const t=Math.min((now-t0)/duration,1);
    const e=easeOut(t);
    currentAngle=startAngle+(targetAngle-startAngle)*e;
    drawWheel(currentAngle);

    if(t<1){requestAnimationFrame(frame);return;}

    // Snap final
    currentAngle=targetAngle;
    drawWheel(currentAngle);
    spinning=false;

    // Record spin
    localStorage.setItem(SPIN_KEY,Date.now().toString());

    // Award prize
    const prize=SEGMENTS[winIdx];
    Coins.add(prize.coins);
    const newBal=Coins.get();
    animCoins(newBal-prize.coins,newBal);

    stats.spins++;stats.total+=prize.coins;
    if(prize.coins>stats.best) stats.best=prize.coins;
    history.unshift({coins:prize.coins,label:prize.label,color:prize.color,glow:prize.glow.startsWith('var')?'#f0c040':prize.glow});
    updateStats();renderHistory();
    litPrize(winIdx);
    showResult(prize);
    startCountdown();

    document.getElementById('spinBtn').disabled=true;
    document.getElementById('spinTxt').textContent='HASTA MAÑANA';

    if(prize.coins>=500) confetti(prize.coins>=2000?90:45);
  }
  requestAnimationFrame(frame);
}

/* ── RESULT ─────────────────────────────────────────────── */
function showResult(prize){
  const panel=document.getElementById('resultPanel');
  const big=prize.coins>=2000;
  const glow=prize.glow.startsWith('var')?'#f0c040':prize.glow;
  panel.innerHTML=`
    <div class="res-prize" style="color:${big?'var(--gold4)':glow};text-shadow:0 0 20px ${glow}40">
      +${prize.coins>=1000?Coins.fmt(prize.coins):prize.coins} fichas
    </div>
    <div class="res-sub">¡Vuelve mañana para otro giro gratis!</div>`;
}

/* ── PRIZES TABLE ────────────────────────────────────────── */
function buildPrizesTable(){
  const g=document.getElementById('prizesGrid');
  const unique=[];
  const seen=new Set();
  SEGMENTS.forEach((s,i)=>{
    if(!seen.has(s.coins)){seen.add(s.coins);unique.push({...s,idx:i});}
  });
  unique.sort((a,b)=>a.coins-b.coins);
  g.innerHTML='';
  unique.forEach(s=>{
    const isJack=s.coins>=2000;
    const glow=s.glow.startsWith('var')?'#f0c040':s.glow;
    const row=document.createElement('div');
    row.className='pz-row'+(isJack?' jackpot-row':'');
    row.id='pz-'+s.coins;
    row.innerHTML=`
      <div class="pz-color" style="background:${glow};box-shadow:0 0 5px ${glow}"></div>
      <div class="pz-name">${s.label} fichas</div>
      <div class="pz-val">${isJack?'✦ ':''} +${Coins.fmt(s.coins)}</div>`;
    g.appendChild(row);
  });
}

function litPrize(idx){
  document.querySelectorAll('.pz-row').forEach(r=>r.classList.remove('lit'));
  const coins=SEGMENTS[idx].coins;
  const el=document.getElementById('pz-'+coins);
  if(el) el.classList.add('lit');
}

/* ── COUNTDOWN TIMER ─────────────────────────────────────── */
function fmtCountdown(ms){
  const s=Math.ceil(ms/1000);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return [h,m,ss].map(v=>String(v).padStart(2,'0')).join(':');
}

let cdInterval=null;
function startCountdown(){
  if(cdInterval) clearInterval(cdInterval);
  updateCountdownUI();
  cdInterval=setInterval(updateCountdownUI,1000);
}
function updateCountdownUI(){
  const last=parseInt(localStorage.getItem(SPIN_KEY)||'0');
  const rem=24*60*60*1000-(Date.now()-last);
  const banner=document.getElementById('cdBanner');
  const timeEl=document.getElementById('cdTime');
  const subEl=document.getElementById('cdSub');
  const btn=document.getElementById('spinBtn');

  if(rem<=0){
    timeEl.innerHTML='<span class="cd-ready">¡LISTO PARA GIRAR!</span>';
    subEl.textContent='Tu giro diario está disponible';
    btn.disabled=false;
    document.getElementById('spinTxt').textContent='GIRAR';
    if(cdInterval){clearInterval(cdInterval);cdInterval=null;}
  } else {
    timeEl.className='cd-time';
    timeEl.textContent=fmtCountdown(rem);
    subEl.textContent='hasta el próximo giro gratis';
    btn.disabled=true;
    document.getElementById('spinTxt').textContent='HASTA MAÑANA';
  }
}

/* ── STATS & HISTORY ─────────────────────────────────────── */
function updateStats(){
  document.getElementById('stSpins').textContent=stats.spins;
  document.getElementById('stTotal').textContent=stats.total>=1000?Coins.fmt(stats.total):stats.total;
  document.getElementById('stBest').textContent=stats.best>0?(stats.best>=1000?Coins.fmt(stats.best):stats.best):'—';
}
function renderHistory(){
  if(history.length>20) history.length=20;
  document.getElementById('histEl').innerHTML=history.map(h=>{
    const glow=h.glow;
    return`<div class="hd" style="background:${glow}18;border:1px solid ${glow}40;color:${glow}">+${h.label}</div>`;
  }).join('');
}

/* ── COINS ANIMATION ─────────────────────────────────────── */
function animCoins(from,to){
  const dur=700,t0=performance.now();
  function step(now){
    const t=Math.min((now-t0)/dur,1),e=1-Math.pow(1-t,3);
    const v=Math.round(from+(to-from)*e);
    document.getElementById('coinsEl').textContent=Coins.fmt(v);
    if(t<1) requestAnimationFrame(step);
    else document.getElementById('coinsEl').textContent=Coins.fmt(to);
  }
  requestAnimationFrame(step);
}

/* ── EFFECTS ─────────────────────────────────────────────── */
function confetti(n=40){
  const cols=['#d4a017','#f0c040','#c020a0','#fff','#10c0d0','#4ade80'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');c.className='cf';
    c.style.cssText=`left:${5+Math.random()*90}vw;top:-10px;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${cols[i%cols.length]};--dur:${1.5+Math.random()*1}s;animation-delay:${Math.random()*.6}s;`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),3500);
  }
}
function toast(msg,type=''){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='toast '+(type||'');el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2800);
}

/* ── CURSOR ──────────────────────────────────────────────── */

document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curDot.style.left=mx+'px';curDot.style.top=my+'px';});
(function loop(){ccx+=(mx-ccx)*.14;ccy+=(my-ccy)*.14;curEl.style.left=ccx+'px';curEl.style.top=ccy+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('button,a').forEach(el=>{el.addEventListener('mouseenter',()=>curEl.classList.add('h'));el.addEventListener('mouseleave',()=>curEl.classList.remove('h'));});

/* ── INIT ────────────────────────────────────────────────── */
document.getElementById('coinsEl').textContent=Coins.fmt(Coins.get());
buildPrizesTable();
resizeWheel();
startCountdown();
</script>
